<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Messenger Online</title>
<link rel="icon" type="image/svg+xml" href="favicon.svg">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Messenger">
<meta name="theme-color" content="#0a3a78">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="favicon.svg">
<style>
@import url('https://fonts.googleapis.com/css2?family=Tahoma&display=swap');
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}

/* ══ FULLSCREEN BACKGROUND ══ */
/* WLM 2009: deep blue left panel + white/light right, or full blue gradient */
html,body{
  width:100%;height:100%;min-height:100vh;
  font-family:'Tahoma',Arial,sans-serif;font-size:12px;
  overflow:hidden;
}

body{
  display:flex;
  background:#0a2d6e;
}

/* Left panel: deep blue with gradient — WLM style */
.left-panel{
  flex:1;
  background:
    radial-gradient(ellipse at 30% 60%, #1a5cb8 0%, transparent 60%),
    radial-gradient(ellipse at 70% 20%, #0d3d8a 0%, transparent 55%),
    linear-gradient(160deg, #0e2d6b 0%, #0a246e 40%, #061b58 100%);
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  padding:40px;
  position:relative;
  overflow:hidden;
}

/* Decorative glow blobs — WLM had subtle light effects */
.left-panel::before{
  content:'';
  position:absolute;
  width:500px;height:500px;
  border-radius:50%;
  background:radial-gradient(circle, rgba(74,144,217,.18) 0%, transparent 70%);
  top:-100px;left:-100px;
  pointer-events:none;
}
.left-panel::after{
  content:'';
  position:absolute;
  width:400px;height:400px;
  border-radius:50%;
  background:radial-gradient(circle, rgba(40,100,200,.15) 0%, transparent 70%);
  bottom:-80px;right:-60px;
  pointer-events:none;
}

/* Butterfly logo — WLM 4-color butterfly */
.butterfly{
  width:88px;height:88px;
  display:grid;grid-template-columns:1fr 1fr;
  grid-template-rows:1fr 1fr;
  gap:5px;margin-bottom:24px;
  filter:drop-shadow(0 4px 16px rgba(0,0,0,.35));
  position:relative;z-index:1;
}
.wing{border-radius:60% 5% 60% 5%;}
.wing-tr{background:#e8441a;transform:rotate(90deg);border-radius:5% 60% 5% 60%;}
.wing-tl{background:#f5a623;}
.wing-bl{background:#4a90d9;transform:rotate(180deg);border-radius:5% 60% 5% 60%;}
.wing-br{background:#7dc142;transform:rotate(270deg);}

.brand-name{
  color:#fff;
  font-size:32px;font-weight:bold;
  letter-spacing:-0.5px;
  text-shadow:0 2px 8px rgba(0,0,0,.4);
  position:relative;z-index:1;
  margin-bottom:6px;
}
.brand-sub{
  color:rgba(255,255,255,.6);
  font-size:12px;
  position:relative;z-index:1;
  text-align:center;
  line-height:1.5;
}

/* Decorative wave at bottom left */
.wave{
  position:absolute;bottom:0;left:0;right:0;height:120px;
  background:linear-gradient(to top, rgba(255,255,255,.04), transparent);
  pointer-events:none;
}

/* ══ RIGHT PANEL ══ */
/* WLM: white/very light grey login form area */
.right-panel{
  width:380px;
  flex-shrink:0;
  background:linear-gradient(to bottom, #f0f4ff 0%, #e8eef8 100%);
  display:flex;
  flex-direction:column;
  border-left:1px solid #c8d4ee;
  position:relative;
}

/* Top bar of right panel */
.rp-header{
  background:linear-gradient(to bottom,#4a90d9,#2563c0);
  padding:12px 20px;
  display:flex;align-items:center;gap:10px;
  flex-shrink:0;
}
.rp-header-logo{
  width:22px;height:22px;
  display:grid;grid-template-columns:1fr 1fr;grid-template-rows:1fr 1fr;gap:2px;
}
.rp-wl{border-radius:50% 3% 50% 3%;}
.rp-wl-tr{background:#e8441a;transform:rotate(90deg);border-radius:3% 50% 3% 50%;}
.rp-wl-tl{background:#f5a623;}
.rp-wl-bl{background:#4a90d9;transform:rotate(180deg);border-radius:3% 50% 3% 50%;}
.rp-wl-br{background:#7dc142;transform:rotate(270deg);}
.rp-header-text{color:#fff;font-size:13px;font-weight:bold;text-shadow:0 1px 2px rgba(0,0,0,.3)}

/* Form container */
.rp-body{
  flex:1;
  display:flex;flex-direction:column;
  padding:28px 28px 20px;
  overflow-y:auto;
}

/* Tabs */
.tabs{
  display:flex;
  border-bottom:2px solid #c8d4ee;
  margin-bottom:22px;
  gap:0;
}
.tab{
  flex:1;text-align:center;
  padding:7px 0;font-size:12px;
  cursor:pointer;color:#666;
  border-bottom:3px solid transparent;
  margin-bottom:-2px;
  transition:color .15s;
}
.tab:hover{color:#003399}
.tab.active{
  color:#003399;font-weight:bold;
  border-bottom:3px solid #316ac5;
}

/* Form sections */
.form-section{display:none;flex-direction:column;gap:14px}
.form-section.active{display:flex}

.field-group{display:flex;flex-direction:column;gap:4px}
.field-label{font-size:11px;color:#333;font-weight:bold}
.field-input{
  border:1px solid #bbc8e0;
  background:#fff;
  padding:6px 8px;
  font-size:12px;font-family:inherit;
  outline:none;
  color:#000;
  transition:border-color .15s,box-shadow .15s;
}
.field-input:focus{
  border-color:#316ac5;
  box-shadow:0 0 0 2px rgba(49,106,197,.18);
}

/* Remember me row */
.remember-row{
  display:flex;align-items:center;gap:7px;
  font-size:11px;color:#444;cursor:pointer;
  margin-top:-4px;
}
.remember-row input{cursor:pointer;accent-color:#316ac5}

/* Forgot password link */
.link-small{
  font-size:11px;color:#316ac5;
  cursor:pointer;text-decoration:none;
  align-self:flex-start;
}
.link-small:hover{text-decoration:underline}

/* Error box */
.error-msg{
  display:none;
  background:#fff0f0;border:1px solid #f8a8a8;
  padding:6px 10px;font-size:11px;color:#c00;
  line-height:1.5;
}
.error-msg.show{display:block}

/* Submit button — WLM blue rectangular */
.btn-primary{
  background:linear-gradient(to bottom,#4a90d9 0%,#316ac5 50%,#2559b0 100%);
  color:#fff;border:1px solid #1a4fa0;
  padding:7px 0;width:100%;
  font-family:inherit;font-size:12px;font-weight:bold;
  cursor:pointer;
  letter-spacing:.2px;
  transition:background .15s;
  box-shadow:0 2px 4px rgba(0,0,0,.2),inset 0 1px 0 rgba(255,255,255,.15);
}
.btn-primary:hover{
  background:linear-gradient(to bottom,#5aa0e9 0%,#3d7ad5 50%,#2f69c0 100%);
}
.btn-primary:active{
  background:linear-gradient(to bottom,#2559b0,#4a90d9);
  box-shadow:inset 0 2px 4px rgba(0,0,0,.2);
}
.btn-primary:disabled{background:#aac;border-color:#88a;cursor:not-allowed;box-shadow:none}

/* Divider */
.divider{
  display:flex;align-items:center;gap:10px;
  font-size:10px;color:#aaa;margin:2px 0;
}
.divider::before,.divider::after{content:'';flex:1;height:1px;background:#d0d8ee}

/* Create account link below */
.create-link{
  text-align:center;font-size:11px;color:#555;margin-top:4px;
}
.create-link a{color:#316ac5;cursor:pointer;text-decoration:none}
.create-link a:hover{text-decoration:underline}

/* Spinner */
.spinner{
  display:inline-block;width:11px;height:11px;
  border:2px solid rgba(255,255,255,.4);border-top-color:#fff;
  border-radius:50%;animation:spin .6s linear infinite;
  vertical-align:middle;margin-right:5px;
}
@keyframes spin{to{transform:rotate(360deg)}}

/* Footer */
.rp-footer{
  padding:10px 20px 14px;
  font-size:10px;color:#aaa;
  text-align:center;
  border-top:1px solid #d8e0f0;
  flex-shrink:0;
}

/* ══ MOBILE ══ */
@media(max-width:700px){
  body{flex-direction:column;overflow:auto;min-height:100dvh}
  .left-panel{
    flex:none;padding:30px 20px 24px;
    min-height:220px;
  }
  .butterfly{width:60px;height:60px;margin-bottom:14px}
  .brand-name{font-size:24px}
  .brand-sub{font-size:11px}
  .right-panel{width:100%;border-left:none;border-top:1px solid #c8d4ee}
  .rp-body{padding:20px 20px 16px}
}
</style>
</head>
<body>

<!-- LEFT: branding -->
<div class="left-panel">
  <div class="butterfly">
    <div class="wing wing-tl"></div>
    <div class="wing wing-tr"></div>
    <div class="wing wing-bl"></div>
    <div class="wing wing-br"></div>
  </div>
  <div class="brand-name">Messenger</div>
  <div class="brand-sub">Conecte-se com seus amigos<br>onde quer que estejam</div>
  <div class="wave"></div>
</div>

<!-- RIGHT: login form -->
<div class="right-panel">

  <div class="rp-header">
    <div class="rp-header-logo">
      <div class="rp-wl rp-wl-tl"></div>
      <div class="rp-wl rp-wl-tr"></div>
      <div class="rp-wl rp-wl-bl"></div>
      <div class="rp-wl rp-wl-br"></div>
    </div>
    <span class="rp-header-text">Messenger Online</span>
  </div>

  <div class="rp-body">

    <div class="tabs">
      <div class="tab active" id="tab-login" onclick="switchTab('login')">Entrar</div>
      <div class="tab" id="tab-register" onclick="switchTab('register')">Criar conta</div>
    </div>

    <!-- LOGIN -->
    <div class="form-section active" id="section-login">
      <div class="field-group">
        <label class="field-label" for="login-user">Nome de usuário</label>
        <input class="field-input" type="text" id="login-user" placeholder="seu_usuario" autocomplete="username" autocorrect="off" autocapitalize="none" spellcheck="false">
      </div>
      <div class="field-group">
        <label class="field-label" for="login-pass">Senha</label>
        <input class="field-input" type="password" id="login-pass" placeholder="••••••••" autocomplete="current-password">
      </div>
      <label class="remember-row">
        <input type="checkbox" id="remember-me"> Lembrar minha senha
      </label>
      <div class="error-msg" id="login-error"></div>
      <button class="btn-primary" id="btn-login" onclick="doLogin()">Entrar</button>
      <div class="divider">ou</div>
      <div class="create-link">Não tem conta? <a onclick="switchTab('register')">Criar conta grátis</a></div>
    </div>

    <!-- REGISTER -->
    <div class="form-section" id="section-register">
      <div class="field-group">
        <label class="field-label" for="reg-user">Nome de usuário</label>
        <input class="field-input" type="text" id="reg-user" placeholder="letras, números e _" autocorrect="off" autocapitalize="none" spellcheck="false">
      </div>
      <div class="field-group">
        <label class="field-label" for="reg-display">Nome de exibição</label>
        <input class="field-input" type="text" id="reg-display" placeholder="Como você quer aparecer">
      </div>
      <div class="field-group">
        <label class="field-label" for="reg-pass">Senha</label>
        <input class="field-input" type="password" id="reg-pass" placeholder="mínimo 6 caracteres" autocomplete="new-password">
      </div>
      <div class="field-group">
        <label class="field-label" for="reg-pass2">Confirmar senha</label>
        <input class="field-input" type="password" id="reg-pass2" placeholder="repita a senha" autocomplete="new-password">
      </div>
      <div class="error-msg" id="reg-error"></div>
      <button class="btn-primary" id="btn-register" onclick="doRegister()">Criar conta</button>
      <div class="create-link">Já tem conta? <a onclick="switchTab('login')">Entrar</a></div>
    </div>

  </div>

  <div class="rp-footer">Messenger Online &copy; 2025 &nbsp;·&nbsp; Firebase + GitHub Pages</div>
</div>

<script type="module">
import{initializeApp}from"https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import{getAuth,signInWithEmailAndPassword,createUserWithEmailAndPassword,onAuthStateChanged,setPersistence,browserLocalPersistence,browserSessionPersistence}from"https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
import{getFirestore,doc,setDoc,getDoc}from"https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const cfg={
  apiKey:"AIzaSyDZkMLH3r5Vym9eE1YqHH8R_rWGR6_rWiw",
  authDomain:"mensageiro-992b3.firebaseapp.com",
  projectId:"mensageiro-992b3",
  storageBucket:"mensageiro-992b3.firebasestorage.app",
  messagingSenderId:"484817145298",
  appId:"1:484817145298:web:cf5ec0ac2b197f9d2c4c0b",
  databaseURL:"https://mensageiro-992b3-default-rtdb.firebaseio.com"
};

const app=initializeApp(cfg),auth=getAuth(app),db=getFirestore(app);
let registering=false;

onAuthStateChanged(auth,user=>{if(user&&!registering)window.location.href='pages/home.html'});

window.switchTab=tab=>{
  document.getElementById('section-login').classList.toggle('active',tab==='login');
  document.getElementById('section-register').classList.toggle('active',tab==='register');
  document.getElementById('tab-login').classList.toggle('active',tab==='login');
  document.getElementById('tab-register').classList.toggle('active',tab==='register');
  clearErrors();
  // focus first field
  setTimeout(()=>{
    const f=document.querySelector('#section-'+tab+' .field-input');if(f)f.focus();
  },50);
};

function clearErrors(){
  ['login-error','reg-error'].forEach(id=>{const el=document.getElementById(id);el.classList.remove('show');el.textContent=''});
}
function showError(id,msg){const el=document.getElementById(id);el.textContent=msg;el.classList.add('show')}
function setLoading(btnId,loading){
  const btn=document.getElementById(btnId);
  btn.disabled=loading;
  btn.innerHTML=loading?'<span class="spinner"></span>Aguarde...':(btnId==='btn-login'?'Entrar':'Criar conta');
}

window.doLogin=async()=>{
  const username=document.getElementById('login-user').value.trim().toLowerCase();
  const password=document.getElementById('login-pass').value;
  const remember=document.getElementById('remember-me').checked;
  clearErrors();
  if(!username||!password){showError('login-error','Preencha todos os campos.');return}
  setLoading('btn-login',true);
  try{
    const snap=await getDoc(doc(db,'usernames',username));
    if(!snap.exists()){showError('login-error','Usuário não encontrado.');setLoading('btn-login',false);return}
    const email=snap.data().email;
    await setPersistence(auth,remember?browserLocalPersistence:browserSessionPersistence);
    await signInWithEmailAndPassword(auth,email,password);
  }catch(e){
    const msgs={'auth/wrong-password':'Senha incorreta.','auth/too-many-requests':'Muitas tentativas. Tente mais tarde.','auth/invalid-credential':'Usuário ou senha incorretos.'};
    showError('login-error',msgs[e.code]||'Erro ao entrar. Tente novamente.');
    setLoading('btn-login',false);
  }
};

window.doRegister=async()=>{
  const username=document.getElementById('reg-user').value.trim().toLowerCase();
  const display=document.getElementById('reg-display').value.trim();
  const pass=document.getElementById('reg-pass').value;
  const pass2=document.getElementById('reg-pass2').value;
  clearErrors();
  if(!username||!display||!pass||!pass2){showError('reg-error','Preencha todos os campos.');return}
  if(!/^[a-z0-9_]{3,20}$/.test(username)){showError('reg-error','Usuário: 3–20 caracteres, apenas letras, números e _.');return}
  if(pass.length<6){showError('reg-error','A senha deve ter pelo menos 6 caracteres.');return}
  if(pass!==pass2){showError('reg-error','As senhas não coincidem.');return}
  registering=true;setLoading('btn-register',true);
  try{
    const check=await getDoc(doc(db,'usernames',username));
    if(check.exists()){showError('reg-error','Nome de usuário já em uso.');setLoading('btn-register',false);registering=false;return}
    const email=`${username}@messenger.local`;
    const cred=await createUserWithEmailAndPassword(auth,email,pass);
    const uid=cred.user.uid;
    await setDoc(doc(db,'users',uid),{username,display,uid,emoji:'😊',message:'Olá! Estou usando o Messenger Online.',status:'online',createdAt:new Date().toISOString()});
    await setDoc(doc(db,'usernames',username),{username,email,uid});
    registering=false;
    window.location.href='pages/home.html';
  }catch(e){
    const msgs={'auth/email-already-in-use':'Nome de usuário já cadastrado.','auth/weak-password':'Senha muito fraca.'};
    showError('reg-error',msgs[e.code]||'Erro ao criar conta. Tente novamente.');
    setLoading('btn-register',false);registering=false;
  }
};

document.addEventListener('keydown',e=>{
  if(e.key==='Enter'){
    const active=document.querySelector('.form-section.active');
    if(active.id==='section-login')window.doLogin();else window.doRegister();
  }
});

// Auto-focus
document.getElementById('login-user').focus();
</script>

<script>
if('serviceWorker'in navigator){
  window.addEventListener('load',()=>{
    navigator.serviceWorker.register('/mensageiro/sw.js',{scope:'/mensageiro/'}).catch(e=>console.log('SW:',e));
  });
}
</script>
</body>
</html>
