<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Conversa — Messenger Online</title>
<link rel="icon" type="image/svg+xml" href="../favicon.svg">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Messenger">
<meta name="theme-color" content="#0a3a78">
<link rel="manifest" href="../manifest.json">
<link rel="apple-touch-icon" href="../favicon.svg">
<style>
@import url('https://fonts.googleapis.com/css2?family=Tahoma&display=swap');
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}

/* ══════════════════════════════════════
   BASE
══════════════════════════════════════ */
html,body{
  width:100%;height:100%;min-height:100vh;
  overflow:hidden;
  font-family:'Tahoma',Arial,sans-serif;font-size:11px;
}
body{
  display:flex;
  /* WLM 2009 background: deep blue behind the window */
  background:linear-gradient(135deg,#0e2d6b 0%,#0a246e 50%,#061b58 100%);
}

/* ══════════════════════════════════════
   LEFT SIDEBAR — contact info, blue WLM panel
══════════════════════════════════════ */
.sidebar{
  width:210px;min-width:180px;flex-shrink:0;
  display:flex;flex-direction:column;
  /* WLM left panel: darker at top, lighter below */
  background:linear-gradient(180deg,#1560c0 0%,#2575d8 35%,#3a8ae0 70%,#4d9ae8 100%);
  border-right:1px solid #0e4a9a;
  position:relative;overflow:hidden;
}
/* Shine overlay */
.sidebar::before{
  content:'';position:absolute;top:0;left:0;right:0;height:50%;
  background:linear-gradient(to bottom,rgba(255,255,255,.14),transparent);
  pointer-events:none;z-index:0;
}

/* ── Back button ── */
.sb-back{
  position:relative;z-index:1;
  display:flex;align-items:center;gap:6px;
  padding:7px 10px;cursor:pointer;
  background:rgba(0,0,0,.18);
  border-bottom:1px solid rgba(0,0,0,.25);
  color:rgba(255,255,255,.9);font-size:11px;
  transition:background .1s;flex-shrink:0;
}
.sb-back:hover{background:rgba(0,0,0,.28)}
.sb-back-icon{font-size:11px}

/* ── Contact card ── */
.sb-card{
  position:relative;z-index:1;
  padding:16px 12px 12px;flex-shrink:0;
  border-bottom:1px solid rgba(0,0,0,.2);
  display:flex;flex-direction:column;align-items:center;gap:0;
}
/* WLM avatar: square with rounded corners, white border, drop shadow */
.sb-av-wrap{position:relative;margin-bottom:10px}
.sb-av{
  width:60px;height:60px;
  border-radius:5px;
  border:2px solid rgba(255,255,255,.85);
  background:linear-gradient(135deg,#5599dd,#99bbff);
  display:flex;align-items:center;justify-content:center;
  font-size:30px;overflow:hidden;
  box-shadow:0 3px 10px rgba(0,0,0,.35),inset 0 1px 0 rgba(255,255,255,.2);
}
.sb-av img{width:100%;height:100%;object-fit:cover}
.sb-dot{
  position:absolute;bottom:-4px;right:-4px;
  width:14px;height:14px;border-radius:50%;
  border:2px solid #2575d8;
  box-shadow:0 1px 3px rgba(0,0,0,.3);
}
.s-online{background:#00d400}.s-away{background:#ffb400}
.s-busy{background:#dd0000}.s-offline{background:#888}

.sb-name{
  font-size:13px;font-weight:bold;color:#fff;
  text-shadow:0 1px 4px rgba(0,0,0,.4);
  text-align:center;width:100%;
  overflow:hidden;text-overflow:ellipsis;white-space:nowrap;
}
.sb-status{
  font-size:10px;color:rgba(255,255,255,.7);
  margin-top:3px;text-align:center;
}
.sb-personal{
  font-size:10px;color:rgba(255,255,255,.62);
  font-style:italic;margin-top:5px;text-align:center;
  overflow:hidden;display:-webkit-box;
  -webkit-line-clamp:2;-webkit-box-orient:vertical;
  width:100%;
}
.sb-song{
  font-size:9px;color:rgba(200,170,255,.9);
  margin-top:4px;text-align:center;
  overflow:hidden;text-overflow:ellipsis;white-space:nowrap;
  width:100%;
}

/* ── Sidebar action buttons ── */
.sb-actions{
  position:relative;z-index:1;
  padding:8px;display:flex;flex-direction:column;gap:4px;flex-shrink:0;
}
.sb-btn{
  display:flex;align-items:center;gap:7px;
  padding:5px 9px;cursor:pointer;
  background:rgba(255,255,255,.1);
  border:1px solid rgba(255,255,255,.14);
  border-radius:3px;
  color:rgba(255,255,255,.88);font-size:10px;
  transition:background .1s,border-color .1s;
  -webkit-tap-highlight-color:transparent;
}
.sb-btn:hover{background:rgba(255,255,255,.22);border-color:rgba(255,255,255,.28)}
.sb-btn:active{background:rgba(255,255,255,.32)}
.sb-btn-icon{font-size:13px;width:16px;text-align:center;flex-shrink:0}

/* ── Sidebar footer ── */
.sb-spacer{flex:1;position:relative;z-index:1}
.sb-footer{
  position:relative;z-index:1;
  padding:12px;display:flex;flex-direction:column;align-items:center;gap:6px;
  border-top:1px solid rgba(0,0,0,.15);
}
.sb-butterfly{
  width:32px;height:32px;
  display:grid;grid-template-columns:1fr 1fr;grid-template-rows:1fr 1fr;gap:2px;
  opacity:.45;
}
.wing{border-radius:60% 5% 60% 5%}
.wing-tr{background:#e8441a;transform:rotate(90deg);border-radius:5% 60% 5% 60%}
.wing-tl{background:#f5a623}
.wing-bl{background:#4a90d9;transform:rotate(180deg);border-radius:5% 60% 5% 60%}
.wing-br{background:#7dc142;transform:rotate(270deg)}
.sb-ver{font-size:9px;color:rgba(255,255,255,.28);text-align:center}

/* ══════════════════════════════════════
   CHAT MAIN — white window
══════════════════════════════════════ */
.chat-main{
  flex:1;display:flex;flex-direction:column;
  background:#fff;min-width:0;
  /* WLM: very slight shadow on left edge */
  box-shadow:inset 2px 0 6px rgba(0,0,0,.08);
}

/* ── XP/Vista Title bar ── */
.title-bar{
  height:22px;flex-shrink:0;
  background:linear-gradient(to bottom,#57a0e5 0%,#2b6cc4 45%,#1a50a0 100%);
  display:flex;align-items:center;padding:0 4px 0 7px;gap:3px;
  user-select:none;
  /* subtle inner shine */
  box-shadow:inset 0 1px 0 rgba(255,255,255,.35);
}
.tb-icon{font-size:13px;margin-right:2px}
.tb-text{
  color:#fff;font-size:11px;font-weight:bold;flex:1;
  text-shadow:1px 1px 2px rgba(0,0,0,.4);
  overflow:hidden;text-overflow:ellipsis;white-space:nowrap;
}
.tb-btn{
  width:17px;height:15px;
  background:linear-gradient(to bottom,#e8e8e8 0%,#c8c8c8 50%,#b8b8b8 100%);
  border:1px solid #666;border-radius:2px;
  cursor:pointer;font-size:9px;font-weight:bold;
  display:flex;align-items:center;justify-content:center;color:#000;
  flex-shrink:0;
  box-shadow:inset 0 1px 0 rgba(255,255,255,.6);
}
.tb-btn:hover{background:linear-gradient(to bottom,#fff,#d8d8d8);border-color:#555}
.tb-btn.close:hover{background:linear-gradient(to bottom,#ff6060,#cc0000);color:#fff;border-color:#990000}

/* ── WLM name bar: name + status under title, like a sub-header ── */
/* In WLM 2009 this shows "Fernanda ● Online" on a light grey bar */
.name-bar{
  height:20px;flex-shrink:0;
  background:linear-gradient(to bottom,#f2f0ea,#e8e4d8);
  border-bottom:2px solid #c8c4b8;
  display:flex;align-items:center;padding:0 10px;gap:8px;
}
.nb-name{font-size:11px;font-weight:bold;color:#003399}
.nb-sep{color:#c8c4b8;font-size:12px}
.nb-status{font-size:10px}
.nb-dot{
  display:inline-block;width:8px;height:8px;border-radius:50%;
  margin-right:3px;vertical-align:middle;border:1px solid rgba(0,0,0,.15);
}

/* ── Messages area ── */
/* WLM 2009: pure white background, no gradients */
.messages-area{
  flex:1;overflow-y:auto;
  background:#fff;
  padding:4px 0 6px;
  min-height:0;
}
/* WLM classic Windows XP scrollbar: wide, grey, raised */
.messages-area::-webkit-scrollbar{width:16px}
.messages-area::-webkit-scrollbar-track{
  background:linear-gradient(to right,#e8e8e8,#f0f0f0);
  border-left:1px solid #c8c8c8;
}
.messages-area::-webkit-scrollbar-thumb{
  background:linear-gradient(to bottom,#d0d0d0 0%,#c0c0c0 50%,#b0b0b0 100%);
  border:1px solid #909090;
  border-radius:1px;
  box-shadow:inset 0 1px 0 rgba(255,255,255,.5);
}
.messages-area::-webkit-scrollbar-thumb:hover{
  background:linear-gradient(to bottom,#c0c0c0,#a8a8a8);
}
.messages-area::-webkit-scrollbar-button{
  display:block;height:16px;
  background:linear-gradient(to bottom,#e0e0e0,#c8c8c8);
  border:1px solid #909090;
}

/* ── Date separator ── */
.date-sep{
  display:flex;align-items:center;gap:10px;
  padding:6px 16px;font-size:9px;color:#bbb;
}
.date-sep::before,.date-sep::after{
  content:'';flex:1;height:1px;background:#e8e8e8;
}

/* ── System / nudge / wink ── */
/* WLM style: icon + italic text, slightly grey row */
.msg-system{
  display:flex;align-items:center;justify-content:center;gap:5px;
  padding:5px 14px;font-size:10px;color:#888;font-style:italic;
  background:#fafafa;
  border-top:1px solid #f0f0f0;border-bottom:1px solid #f0f0f0;
  margin:2px 0;line-height:1.4;
}
/* Nudge special style — orange accent like WLM */
.msg-nudge{
  display:flex;align-items:center;justify-content:center;gap:5px;
  padding:5px 14px;font-size:10px;
  color:#c85000;font-style:italic;
  background:#fff8f4;
  border-top:1px solid #f0d8c8;border-bottom:1px solid #f0d8c8;
  margin:2px 0;
}
.msg-nudge-icon{font-size:14px}
.msg-wink{
  display:flex;align-items:center;justify-content:center;gap:5px;
  padding:5px 14px;font-size:10px;
  color:#6644aa;font-style:italic;
  background:#f8f4ff;
  border-top:1px solid #e0d0f8;border-bottom:1px solid #e0d0f8;
  margin:2px 0;
}

/* ── Message rows: WLM 2009 plain text style ── */
/* NO bubbles. Avatar square left/right, name bold in sender color, plain text below */
.msg-row{
  display:flex;align-items:flex-start;gap:8px;
  padding:4px 14px 2px;
}
.msg-row.mine{flex-direction:row-reverse}

/* Avatar: square, rounded 3px, 1px border — WLM pixel art look */
.msg-av{
  width:32px;height:32px;
  border-radius:3px;
  border:1px solid #b8c8e4;
  background:linear-gradient(135deg,#7aacee,#aac4ff);
  display:flex;align-items:center;justify-content:center;
  font-size:17px;overflow:hidden;flex-shrink:0;
  margin-top:1px;
  box-shadow:1px 1px 3px rgba(0,0,0,.15);
}
.msg-av img{width:100%;height:100%;object-fit:cover}

.msg-block{flex:1;min-width:0;max-width:78%}

/* Name + time on same line, WLM style */
.msg-meta{
  display:flex;align-items:baseline;gap:7px;
  margin-bottom:1px;
}
.msg-sender{font-weight:bold;font-size:11px}
.msg-time{font-size:9px;color:#aaa}

/* Each message line — plain text, no box */
.msg-line{
  font-size:11px;color:#1a1a1a;
  line-height:1.55;
  padding:0 0 1px;
  display:flex;align-items:flex-end;gap:5px;
  word-break:break-word;
}
/* Mine messages: slightly indented from right side */
.msg-row.mine .msg-block{text-align:left}

/* Read receipts: WLM blue check marks */
.msg-read{font-size:9px;color:#3388cc;flex-shrink:0;letter-spacing:-1px}
.msg-read.unsent{color:#bbb}

/* Images and files */
.msg-img{
  max-width:200px;max-height:160px;
  cursor:pointer;
  border:1px solid #ccd8ee;
  display:block;margin:2px 0;
  box-shadow:1px 1px 4px rgba(0,0,0,.12);
}
.msg-img:hover{border-color:#4a90d9;opacity:.94}
.msg-file{
  display:inline-flex;align-items:center;gap:5px;
  padding:3px 9px;
  background:linear-gradient(to bottom,#f0f4ff,#e4ecff);
  border:1px solid #b8cce8;
  cursor:pointer;color:#003399;font-size:10px;
  box-shadow:1px 1px 3px rgba(0,0,0,.1);
}
.msg-file:hover{background:linear-gradient(to bottom,#e0ecff,#d0e4ff)}

/* ══════════════════════════════════════
   INPUT AREA — WLM XP/Vista style
══════════════════════════════════════ */
.input-area{
  flex-shrink:0;
  /* WLM: beige-grey tones */
  border-top:2px solid #b0b4c4;
}

/* Toolbar: WLM XP beige-grey with XP-style raised buttons */
.toolbar{
  display:flex;align-items:center;flex-wrap:nowrap;gap:1px;
  padding:3px 7px;
  background:linear-gradient(to bottom,#f5f2e8,#e8e4d4);
  border-bottom:1px solid #c4c0b4;
  min-height:26px;overflow:hidden;
}
.tool-sep{
  width:1px;height:18px;
  background:linear-gradient(to bottom,#c8c4b8,#b8b4a8);
  margin:0 3px;flex-shrink:0;
}
/* XP raised button style */
.tool-btn{
  min-width:22px;height:21px;
  background:linear-gradient(to bottom,#faf8f2 0%,#ece8d8 100%);
  border:1px solid transparent;
  border-radius:2px;
  cursor:pointer;font-size:11px;
  display:flex;align-items:center;justify-content:center;
  padding:0 3px;color:#222;flex-shrink:0;
  transition:all .07s;
}
.tool-btn:hover{
  background:linear-gradient(to bottom,#fff 0%,#d8d4c4 100%);
  border-color:#8898b8;
  box-shadow:0 1px 2px rgba(0,0,0,.12);
}
.tool-btn.active{
  background:linear-gradient(to bottom,#c0d4f4 0%,#98b8e8 100%);
  border-color:#5570a8;
  box-shadow:inset 0 1px 2px rgba(0,0,0,.15);
}
.font-sel{
  font-size:10px;font-family:inherit;
  background:linear-gradient(to bottom,#fff,#f0ede4);
  border:1px solid #b8b4a8;height:20px;
  padding:0 2px;outline:none;flex-shrink:0;
}
.font-sel:focus{border-color:#5570a8}
.color-swatch{
  width:15px;height:15px;
  border:1px solid #888;
  cursor:pointer;flex-shrink:0;
  box-shadow:inset 0 0 0 1px rgba(255,255,255,.4);
}
.mute-btn{
  margin-left:auto;font-size:10px;font-family:inherit;
  background:transparent;border:1px solid transparent;
  padding:1px 5px;cursor:pointer;color:#555;border-radius:2px;flex-shrink:0;
}
.mute-btn:hover{background:#e8e4d4;border-color:#b0acac}

/* Emoji panel */
.emoji-panel{
  display:none;flex-wrap:wrap;gap:1px;
  padding:4px 6px;
  background:#fff;border-bottom:1px solid #c8c4b4;
  max-height:76px;overflow-y:auto;
}
.emoji-panel.open{display:flex}
.ep-em{font-size:18px;cursor:pointer;padding:1px 3px;border-radius:2px;line-height:1.3}
.ep-em:hover{background:#dce8ff}

/* Color panel */
.color-panel{
  display:none;flex-wrap:wrap;gap:3px;align-items:center;
  padding:4px 8px;background:#fff;border-bottom:1px solid #c8c4b4;
}
.color-panel.open{display:flex}
.cp-c{
  width:16px;height:16px;border:2px solid transparent;cursor:pointer;
  box-shadow:inset 0 0 0 1px rgba(0,0,0,.2);
}
.cp-c:hover{border-color:#555}
.cp-c.sel{border-color:#000;box-shadow:0 0 0 1px #fff inset,inset 0 0 0 2px rgba(0,0,0,.4)}
.cp-label{font-size:10px;color:#666;margin-right:2px}

/* Typing indicator */
.typing-bar{
  height:15px;flex-shrink:0;
  padding:0 10px;
  font-size:10px;color:#888;font-style:italic;
  background:linear-gradient(to bottom,#f5f2e8,#eee9d4);
  border-top:1px solid #d4d0c8;
  display:flex;align-items:center;
}

/* Input row */
.input-row{
  display:flex;align-items:flex-end;gap:6px;
  padding:5px 7px 6px;
  background:linear-gradient(to bottom,#f8f5ef,#f0ede4);
}
.chat-ta{
  flex:1;
  border:1px solid #b8b4a8;
  background:#fff;
  padding:4px 7px;
  font-size:11px;font-family:'Tahoma',Arial,sans-serif;
  resize:none;outline:none;
  min-height:34px;max-height:110px;
  overflow-y:auto;line-height:1.5;
  box-shadow:inset 0 1px 3px rgba(0,0,0,.1);
}
.chat-ta:focus{border-color:#5570a8;box-shadow:inset 0 1px 3px rgba(0,0,0,.1),0 0 0 2px rgba(85,112,168,.15)}
.chat-ta::-webkit-scrollbar{width:8px}
.chat-ta::-webkit-scrollbar-thumb{background:#ccc}
/* Send button: WLM XP grey raised button */
.send-btn{
  font-family:inherit;font-size:11px;font-weight:bold;
  background:linear-gradient(to bottom,#f0ede4 0%,#d8d4c4 50%,#c8c4b4 100%);
  border:1px solid #888;
  border-radius:2px;
  padding:0 16px;height:30px;
  cursor:pointer;white-space:nowrap;
  align-self:flex-end;
  box-shadow:0 1px 2px rgba(0,0,0,.15),inset 0 1px 0 rgba(255,255,255,.6);
  color:#111;
}
.send-btn:hover{
  background:linear-gradient(to bottom,#fff 0%,#e4e0d0 100%);
  border-color:#5570a8;
  box-shadow:0 1px 3px rgba(0,0,0,.2),inset 0 1px 0 rgba(255,255,255,.7);
}
.send-btn:active{
  background:linear-gradient(to bottom,#c8c4b4,#dcdcd4);
  box-shadow:inset 0 2px 3px rgba(0,0,0,.15);
}

/* ══════════════════════════════════════
   NUDGE / WINK ANIMATIONS
══════════════════════════════════════ */
@keyframes nudge{
  0%  {transform:translate(0,0)}
  8%  {transform:translate(-8px, 4px)}
  16% {transform:translate( 9px,-4px)}
  24% {transform:translate(-7px, 6px)}
  32% {transform:translate( 8px,-3px)}
  40% {transform:translate(-6px, 4px)}
  48% {transform:translate( 7px,-5px)}
  56% {transform:translate(-4px, 3px)}
  64% {transform:translate( 5px,-2px)}
  72% {transform:translate(-3px, 2px)}
  84% {transform:translate( 2px,-1px)}
  100%{transform:translate(0,0)}
}
@keyframes wink{
  0%  {transform:scale(1)}
  25% {transform:scale(1.03)}
  50% {transform:scale(.985)}
  75% {transform:scale(1.01)}
  100%{transform:scale(1)}
}
.nudge-anim .messages-area{animation:nudge .75s ease}
.wink-anim  .messages-area{animation:wink  .85s ease}

/* ══════════════════════════════════════
   LOADING
══════════════════════════════════════ */
.loading-screen{
  position:fixed;inset:0;
  background:rgba(8,28,90,.94);
  display:flex;align-items:center;justify-content:center;
  z-index:900;flex-direction:column;gap:14px;
}
.loading-screen.hidden{display:none}
.loading-text{color:#fff;font-size:13px}
.loading-bar{width:160px;height:4px;background:rgba(255,255,255,.2);border-radius:2px;overflow:hidden}
.loading-fill{height:100%;background:#4a90d9;border-radius:2px;animation:lfill 1.2s ease forwards}
@keyframes lfill{from{width:0%}to{width:100%}}

/* ══════════════════════════════════════
   MODALS
══════════════════════════════════════ */
.overlay{
  display:none;position:fixed;inset:0;
  background:rgba(0,0,0,.45);z-index:500;
  align-items:center;justify-content:center;
}
.overlay.show{display:flex}
.modal{
  background:#ece9d8;border:1px solid #777;
  box-shadow:5px 5px 16px rgba(0,0,0,.45);
  width:340px;max-height:92vh;overflow-y:auto;
  animation:mapp .15s ease;
}
@keyframes mapp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.modal-bar{
  height:22px;
  background:linear-gradient(to bottom,#57a0e5,#1a50a0);
  display:flex;align-items:center;padding:0 6px;gap:4px;
  position:sticky;top:0;z-index:2;
}
.modal-bar span{color:#fff;font-size:11px;font-weight:bold;flex:1;text-shadow:1px 1px rgba(0,0,0,.3)}
.modal-body{padding:12px;display:flex;flex-direction:column;gap:8px}
.modal-btns{display:flex;justify-content:flex-end;gap:6px}
.m-btn{
  font-size:11px;font-family:inherit;
  background:linear-gradient(to bottom,#f0ede4,#d8d4c8);
  border:1px solid #888;padding:3px 14px;cursor:pointer;border-radius:2px;
}
.m-btn:hover{background:linear-gradient(to bottom,#fff,#e8e4d8)}
.m-btn.primary{background:linear-gradient(to bottom,#57a0e5,#1a50a0);color:#fff;border-color:#1a50a0}
.hist-list{display:flex;flex-direction:column;max-height:300px;overflow-y:auto}
.hist-item{padding:3px 6px;font-size:11px;display:flex;gap:6px;border-bottom:1px solid #f0f0f0;align-items:baseline}
.hi-name{font-weight:bold;min-width:52px;flex-shrink:0;font-size:10px}
.hi-txt{color:#444;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.hi-t{color:#bbb;font-size:9px;flex-shrink:0}
.hi-mine .hi-name{color:#c00}.hi-theirs .hi-name{color:#00c}
.hi-sys{color:#aaa;font-style:italic;justify-content:center;font-size:10px}

/* TOAST */
.toast{
  position:fixed;top:24px;left:50%;transform:translateX(-50%);
  background:rgba(30,30,30,.92);color:#fff;
  padding:6px 16px;font-size:11px;z-index:700;
  display:none;white-space:nowrap;
  box-shadow:0 2px 8px rgba(0,0,0,.3);
}
.toast.show{display:block;animation:tfade .18s ease}
@keyframes tfade{from{opacity:0}to{opacity:1}}

/* ══════════════════════════════════════
   MOBILE
══════════════════════════════════════ */
@media(max-width:768px){
  body{height:100dvh;overflow:hidden}
  .sidebar{display:none}
  .chat-main{width:100%}
  .title-bar{
    height:calc(44px + max(0px,env(safe-area-inset-top)));
    padding-top:max(0px,env(safe-area-inset-top));
    align-items:flex-end;padding-bottom:5px;
  }
  .tb-text{font-size:13px}
  .name-bar{height:22px}
  .nb-name,.nb-status{font-size:12px}
  .msg-row{padding:5px 12px 3px}
  .msg-av{width:40px;height:40px;font-size:21px;border-radius:50%;margin-top:0}
  .msg-line{font-size:13px}
  .msg-sender{font-size:13px}
  .msg-time{font-size:11px}
  .msg-img{max-width:220px;max-height:180px}
  .chat-ta{font-size:14px;min-height:38px}
  .send-btn{height:36px;font-size:13px;padding:0 14px}
  .toolbar{padding:3px 8px;gap:2px}
  .tool-btn{width:28px;height:26px;font-size:13px}
  .ep-em{font-size:22px}
  .input-row{padding:6px 8px;padding-bottom:max(6px,env(safe-area-inset-bottom))}
  .messages-area::-webkit-scrollbar{display:none}
  .emoji-panel{max-height:100px}
  .modal{width:92vw}
}
</style>
</head>
<body>

<!-- ══ LOADING ══ -->
<div class="loading-screen" id="loading">
  <div class="loading-text">💬 Carregando conversa...</div>
  <div class="loading-bar"><div class="loading-fill"></div></div>
</div>

<!-- ══ SIDEBAR ══ -->
<div class="sidebar">
  <div class="sb-back" onclick="goBack()">
    <span class="sb-back-icon">◀</span>
    <span>Voltar aos contatos</span>
  </div>

  <div class="sb-card">
    <div class="sb-av-wrap">
      <div class="sb-av" id="sbAv">😊</div>
      <div class="sb-dot s-offline" id="sbDot"></div>
    </div>
    <div class="sb-name"    id="sbName">—</div>
    <div class="sb-status"  id="sbStatus">Offline</div>
    <div class="sb-personal"id="sbMsg"></div>
    <div class="sb-song"    id="sbSong" style="display:none"></div>
  </div>

  <div class="sb-actions">
    <div class="sb-btn" onclick="sendNudge()">
      <span class="sb-btn-icon">📳</span>Cutucada
    </div>
    <div class="sb-btn" onclick="sendWink()">
      <span class="sb-btn-icon">✨</span>Enviar Wink
    </div>
    <div class="sb-btn" onclick="document.getElementById('imgInput').click()">
      <span class="sb-btn-icon">🖼️</span>Enviar imagem
    </div>
    <div class="sb-btn" onclick="document.getElementById('fileInput').click()">
      <span class="sb-btn-icon">📎</span>Enviar arquivo
    </div>
    <div class="sb-btn" onclick="openHistory()">
      <span class="sb-btn-icon">📋</span>Histórico
    </div>
    <div class="sb-btn" id="sbMuteBtn" onclick="toggleChatMute()">
      <span class="sb-btn-icon">🔔</span>Silenciar chat
    </div>
  </div>

  <div class="sb-spacer"></div>
  <div class="sb-footer">
    <div class="sb-butterfly">
      <div class="wing wing-tl"></div><div class="wing wing-tr"></div>
      <div class="wing wing-bl"></div><div class="wing wing-br"></div>
    </div>
    <div class="sb-ver">Messenger Online</div>
  </div>
</div>

<!-- ══ CHAT MAIN ══ -->
<div class="chat-main" id="chatWindow">

  <!-- XP Title bar -->
  <div class="title-bar">
    <span class="tb-icon">💬</span>
    <span class="tb-text" id="tbText">Conversa</span>
    <div class="tb-btn" onclick="goBack()" title="Voltar">◀</div>
    <div class="tb-btn">—</div>
    <div class="tb-btn">□</div>
    <div class="tb-btn close" onclick="goBack()">✕</div>
  </div>

  <!-- WLM name bar -->
  <div class="name-bar">
    <span class="nb-name" id="nbName">—</span>
    <span class="nb-sep">›</span>
    <span class="nb-status" id="nbStatus">
      <span class="nb-dot" id="nbDot" style="background:#aaa"></span>Offline
    </span>
  </div>

  <!-- Messages -->
  <div class="messages-area" id="messagesArea">
    <div class="msg-system">Início da conversa. Diga olá! 👋</div>
  </div>

  <!-- ── Input area ── -->
  <div class="input-area">

    <!-- XP-style toolbar -->
    <div class="toolbar">
      <select class="font-sel" id="fontFamSel" onchange="applyFont()" title="Fonte" style="width:76px">
        <option value="Tahoma">Tahoma</option>
        <option value="Arial">Arial</option>
        <option value="Times New Roman">Times</option>
        <option value="Courier New">Courier</option>
        <option value="Comic Sans MS">Comic</option>
        <option value="Verdana">Verdana</option>
      </select>
      <select class="font-sel" id="fontSizeSel" onchange="applyFont()" title="Tamanho" style="width:36px">
        <option value="10">10</option>
        <option value="11" selected>11</option>
        <option value="12">12</option>
        <option value="14">14</option>
        <option value="16">16</option>
        <option value="18">18</option>
        <option value="20">20</option>
      </select>
      <div class="tool-sep"></div>
      <div class="tool-btn" id="btnBold"      title="Negrito (Ctrl+B)"    onclick="toggleFmt('bold')"><b>N</b></div>
      <div class="tool-btn" id="btnItalic"    title="Itálico (Ctrl+I)"    onclick="toggleFmt('italic')"><i>I</i></div>
      <div class="tool-btn" id="btnUnderline" title="Sublinhado (Ctrl+U)" onclick="toggleFmt('underline')"><u>S</u></div>
      <div class="tool-sep"></div>
      <div class="color-swatch" id="colorSwatch" style="background:#000000" onclick="toggleColorPanel()" title="Cor do texto"></div>
      <div class="tool-btn" title="Emojis" onclick="toggleEmojiPanel()">😊</div>
      <div class="tool-sep"></div>
      <div class="tool-btn" title="Cutucada"    onclick="sendNudge()">📳</div>
      <div class="tool-btn" title="Wink"        onclick="sendWink()">✨</div>
      <div class="tool-sep"></div>
      <div class="tool-btn" title="Imagem"      onclick="document.getElementById('imgInput').click()">🖼️</div>
      <div class="tool-btn" title="Arquivo"     onclick="document.getElementById('fileInput').click()">📎</div>
      <div class="tool-btn" title="Histórico"   onclick="openHistory()">📋</div>
      <input type="file" id="imgInput"  accept="image/*" style="display:none" onchange="sendImage(event)">
      <input type="file" id="fileInput"          style="display:none" onchange="sendFile(event)">
      <button class="mute-btn" id="muteChatBtn" onclick="toggleChatMute()" title="Silenciar chat">🔔</button>
    </div>

    <!-- Emoji panel -->
    <div class="emoji-panel" id="emojiPanel"></div>
    <!-- Color panel -->
    <div class="color-panel" id="colorPanel"><span class="cp-label">Cor:</span></div>

    <!-- Typing bar -->
    <div class="typing-bar" id="typingBar"></div>

    <!-- Input row -->
    <div class="input-row">
      <textarea class="chat-ta" id="chatInput"
        placeholder="Escreva uma mensagem... (Enter envia, Shift+Enter nova linha)"
        onkeydown="handleKey(event)"
        oninput="onTyping();autoResize(this)"></textarea>
      <button class="send-btn" id="sendBtn" onclick="sendMsg()">Enviar</button>
    </div>
  </div>
</div>

<!-- ══ HISTORY MODAL ══ -->
<div class="overlay" id="histModal">
  <div class="modal">
    <div class="modal-bar">
      <span>📋 Histórico de conversa</span>
      <div class="tb-btn close" onclick="document.getElementById('histModal').classList.remove('show')">✕</div>
    </div>
    <div class="modal-body">
      <div class="hist-list" id="histList"></div>
      <div class="modal-btns">
        <button class="m-btn primary" onclick="document.getElementById('histModal').classList.remove('show')">Fechar</button>
      </div>
    </div>
  </div>
</div>

<!-- ══ LIGHTBOX ══ -->
<div class="overlay" id="lightbox" onclick="this.classList.remove('show')">
  <img id="lbImg"
    style="max-width:92vw;max-height:92vh;border:3px solid #fff;box-shadow:0 0 40px rgba(0,0,0,.8)"
    src="" alt="">
</div>

<div class="toast" id="toast"></div>

<!-- ══════════════════════════════════════
     SCRIPT
══════════════════════════════════════ -->
<script type="module">
import{initializeApp}           from"https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import{getAuth,onAuthStateChanged}from"https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
import{getFirestore,doc,getDoc,getDocs,collection,addDoc,query,orderBy,limit,
        onSnapshot,serverTimestamp as fsTs,setDoc,updateDoc,arrayUnion}
                                 from"https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";
import{getDatabase,ref,set,onValue,serverTimestamp}
                                 from"https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

const cfg={
  apiKey:"AIzaSyDZkMLH3r5Vym9eE1YqHH8R_rWGR6_rWiw",
  authDomain:"mensageiro-992b3.firebaseapp.com",
  projectId:"mensageiro-992b3",
  storageBucket:"mensageiro-992b3.firebasestorage.app",
  messagingSenderId:"484817145298",
  appId:"1:484817145298:web:cf5ec0ac2b197f9d2c4c0b",
  databaseURL:"https://mensageiro-992b3-default-rtdb.firebaseio.com"
};
const app=initializeApp(cfg),auth=getAuth(app),db=getFirestore(app),rtdb=getDatabase(app);

const params=new URLSearchParams(window.location.search);
const otherUid=params.get('with');
if(!otherUid){window.location.href='home.html'}

let myUid=null,myData=null,otherData=null,chatId=null,unsubMsgs=null;
let typingTimeout=null,chatMuted=false;

const fmt={bold:false,italic:false,underline:false,color:'#000000',font:'Tahoma',size:'11'};

const EMOJIS=['😊','😁','😂','😍','😘','😎','🤔','😢','😤','😴','😜','🤩','👍','👎','❤️','💔','🎉','🎮','🙏','✝️','🌸','🔥','⚽','🎵','😈','👻','💀','🐱','🐶','🦋','😏','🥰','😭','😱','🤣','😅','🙄','😬','🤦','🎸'];
const COLORS=['#000000','#cc0000','#003399','#008800','#7755aa','#cc6600','#006688','#aa0066','#555555','#996633','#ff6600','#009900','#6600cc','#cc0099','#0066cc'];

const STATUS_LABEL={online:'Online',away:'Ausente',busy:'Ocupado',offline:'Offline'};
const STATUS_COLOR={online:'#00d400',away:'#ffb400',busy:'#dd0000',offline:'#888'};

function getCid(a,b){return[a,b].sort().join('_')}
function muteKey(){return`mute_chat_${chatId}`}

const NS={
  get muted(){return JSON.parse(localStorage.getItem('notif_muted')?? 'false')},
  get sound(){return JSON.parse(localStorage.getItem('notif_sound')?? 'true')},
  get browser(){return JSON.parse(localStorage.getItem('notif_browser')?? 'false')},
};

// ── Chat mute ──
window.toggleChatMute=()=>{
  chatMuted=!chatMuted;
  localStorage.setItem(muteKey(),JSON.stringify(chatMuted));
  const ic=chatMuted?'🔕':'🔔';
  document.getElementById('muteChatBtn').textContent=ic;
  document.getElementById('sbMuteBtn').innerHTML=`<span class="sb-btn-icon">${ic}</span>${chatMuted?'Ativar notif.':'Silenciar chat'}`;
  showToast(chatMuted?'🔕 Chat silenciado':'🔔 Notificações ativas');
};

// ── Notify incoming message ──
function notifyMsg(name,text){
  if(NS.muted||chatMuted||document.hasFocus())return;
  if(NS.sound)playSound('msg');
  if(NS.browser&&Notification.permission==='granted')
    new Notification(name+' diz:',{body:text,icon:'../favicon.svg',tag:'msg',renotify:true});
  let blink=true;const orig=document.title;
  const iv=setInterval(()=>{document.title=blink?'💬 '+name+'...':orig;blink=!blink},900);
  window.addEventListener('focus',()=>{clearInterval(iv);document.title=orig},{once:true});
}

// ── Auth / init ──
onAuthStateChanged(auth,async user=>{
  if(!user){window.location.href='../index.html';return}
  myUid=user.uid;chatId=getCid(myUid,otherUid);
  chatMuted=JSON.parse(localStorage.getItem(muteKey())?? 'false');
  const ic=chatMuted?'🔕':'🔔';
  document.getElementById('muteChatBtn').textContent=ic;
  document.getElementById('sbMuteBtn').innerHTML=`<span class="sb-btn-icon">${ic}</span>${chatMuted?'Ativar notif.':'Silenciar chat'}`;

  const[ms,os]=await Promise.all([
    getDoc(doc(db,'users',myUid)),
    getDoc(doc(db,'users',otherUid))
  ]);
  if(!ms.exists()||!os.exists()){alert('Erro ao carregar.');window.location.href='home.html';return}
  myData=ms.data();otherData=os.data();

  // ── Populate UI ──
  const name=otherData.display||otherData.username;
  const st=otherData.status||'offline';
  document.title=name+' — Messenger Online';
  document.getElementById('tbText').textContent=name;
  document.getElementById('nbName').textContent=name;
  const nbS=document.getElementById('nbStatus');
  nbS.innerHTML=`<span class="nb-dot" style="background:${STATUS_COLOR[st]}"></span>${STATUS_LABEL[st]}`;

  const sbAv=document.getElementById('sbAv');
  if(otherData.photoBase64)sbAv.innerHTML=`<img src="${otherData.photoBase64}" alt="">`;
  else sbAv.textContent=otherData.emoji||'😊';
  document.getElementById('sbName').textContent=name;
  document.getElementById('sbDot').className='sb-dot s-'+st;
  document.getElementById('sbStatus').textContent=STATUS_LABEL[st];
  document.getElementById('sbMsg').textContent=otherData.message||'';
  const ss=document.getElementById('sbSong');
  if(otherData.song){ss.textContent='🎵 '+otherData.song;ss.style.display='block'}

  buildEmojiPanel();buildColorPanel();
  if(window.innerWidth<=768)document.getElementById('sendBtn').textContent='➤';

  // ── Messages ──
  const q=query(collection(db,'chats',chatId,'messages'),orderBy('createdAt'));
  let first=true;
  unsubMsgs=onSnapshot(q,snap=>{
    renderMsgs(snap.docs,first);
    if(!first){
      const last=snap.docs[snap.docs.length-1];
      if(last&&last.data().senderUid!==myUid)
        notifyMsg(name,last.data().text||'📎');
    }
    if(document.hasFocus())markRead(snap.docs);
    first=false;
  });

  // ── Typing ──
  onValue(ref(rtdb,`typing/${chatId}/${otherUid}`),snap=>{
    document.getElementById('typingBar').textContent=
      snap.val()?.typing?name+' está digitando...':'';
  });

  window.addEventListener('focus',()=>{
    getDocs(query(collection(db,'chats',chatId,'messages'),orderBy('createdAt')))
      .then(s=>markRead(s.docs));
  });

  document.getElementById('loading').classList.add('hidden');
  document.getElementById('chatInput').focus();
});

// ── Mark as read ──
async function markRead(docs){
  for(const d of docs){
    const data=d.data();
    if(data.senderUid!==myUid&&!(data.readBy||[]).includes(myUid))
      await updateDoc(doc(db,'chats',chatId,'messages',d.id),{readBy:arrayUnion(myUid)});
  }
}

// ── Render messages ──
function renderMsgs(docs,skipScroll){
  const area=document.getElementById('messagesArea');
  const atBottom=area.scrollHeight-area.scrollTop-area.clientHeight<90;
  area.innerHTML='';
  if(!docs.length){
    area.innerHTML='<div class="msg-system">Início da conversa. Diga olá! 👋</div>';return;
  }

  // Group consecutive same-sender, with date separators
  const groups=[];
  let lastDate='';
  docs.forEach(d=>{
    const data=d.data();
    const mine=data.senderUid===myUid;
    const dateStr=data.createdAt?.toDate
      ?data.createdAt.toDate().toLocaleDateString('pt-BR',{day:'2-digit',month:'2-digit',year:'2-digit'}):'';
    if(dateStr&&dateStr!==lastDate){groups.push({type:'date',label:dateStr});lastDate=dateStr}

    const isSpecial=data.type==='nudge'||data.type==='wink'||data.type==='system';
    if(isSpecial){
      groups.push({type:data.type,text:data.text});return;
    }
    const last=groups[groups.length-1];
    if(last&&last.type==='msg'&&last.mine===mine){
      last.msgs.push({data,id:d.id});
    } else {
      groups.push({type:'msg',mine,msgs:[{data,id:d.id}]});
    }
  });

  groups.forEach(grp=>{
    // Date separator
    if(grp.type==='date'){
      const div=document.createElement('div');div.className='date-sep';div.textContent=grp.label;
      area.appendChild(div);return;
    }
    // Nudge
    if(grp.type==='nudge'){
      const div=document.createElement('div');div.className='msg-nudge';
      div.innerHTML=`<span class="msg-nudge-icon">📳</span><span>${escHtml(grp.text)}</span>`;
      area.appendChild(div);return;
    }
    // Wink
    if(grp.type==='wink'){
      const div=document.createElement('div');div.className='msg-wink';
      div.innerHTML=`<span>✨</span><span>${escHtml(grp.text)}</span>`;
      area.appendChild(div);return;
    }
    // System
    if(grp.type==='system'){
      const div=document.createElement('div');div.className='msg-system';
      div.textContent=grp.text;area.appendChild(div);return;
    }

    // Regular message group
    const{mine,msgs}=grp;
    const sender=mine?myData:otherData;
    // WLM: sender name in their chosen color (or default red for me, blue for them)
    const nameColor=mine?(myData?.nameColor||'#cc0000'):(otherData?.nameColor||'#0033cc');
    const avHtml=sender?.photoBase64
      ?`<img src="${sender.photoBase64}" alt="">`
      :(sender?.emoji||'😊');

    const row=document.createElement('div');
    row.className='msg-row'+(mine?' mine':'');

    // Avatar
    const av=document.createElement('div');
    av.className='msg-av';av.innerHTML=avHtml;

    // Block (name header + lines)
    const block=document.createElement('div');
    block.className='msg-block';

    // Name + time header
    const firstData=msgs[0].data;
    const t=firstData.createdAt?.toDate
      ?firstData.createdAt.toDate().toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit'}):'';
    const meta=document.createElement('div');meta.className='msg-meta';
    meta.innerHTML=`<span class="msg-sender" style="color:${nameColor}">${escHtml(sender?.display||sender?.username||'?')}</span><span class="msg-time">${t}</span>`;
    block.appendChild(meta);

    // Message lines
    msgs.forEach(({data,id})=>{
      let content='';
      if(data.type==='image'){
        content=`<img class="msg-img" src="${data.imageBase64}" alt="imagem" onclick="openLightbox('${data.imageBase64}')">`;
      } else if(data.type==='file'){
        content=`<span class="msg-file" onclick="downloadFile('${data.fileName}','${data.fileBase64}')">📎 ${escHtml(data.fileName)}</span>`;
      } else {
        let txt=escHtml(data.text||'');
        if(data.bold)txt=`<b>${txt}</b>`;
        if(data.italic)txt=`<i>${txt}</i>`;
        if(data.underline)txt=`<u>${txt}</u>`;
        content=txt.replace(/\n/g,'<br>');
      }
      const style=[];
      if(data.fontFamily&&data.fontFamily!=='Tahoma')style.push(`font-family:'${data.fontFamily}'`);
      if(data.fontSize&&data.fontSize!==11)style.push(`font-size:${data.fontSize}px`);
      if(data.textColor&&data.textColor!=='#000000')style.push(`color:${data.textColor}`);
      const sAttr=style.length?` style="${style.join(';')}"` :'';
      // Read receipt
      let readMark='';
      if(mine){
        const read=(data.readBy||[]).includes(otherUid);
        readMark=`<span class="msg-read${read?'':' unsent'}">${read?'✓✓':'✓'}</span>`;
      }
      const line=document.createElement('div');line.className='msg-line';
      line.innerHTML=`<span${sAttr}>${content}</span>${readMark}`;
      block.appendChild(line);
    });

    if(mine){row.appendChild(block);row.appendChild(av);}
    else{row.appendChild(av);row.appendChild(block);}
    area.appendChild(row);
  });

  if(!skipScroll||atBottom)area.scrollTop=area.scrollHeight;
}

// ── Send text ──
window.sendMsg=async()=>{
  const inp=document.getElementById('chatInput');
  const text=inp.value.trim();if(!text)return;
  inp.value='';autoResize(inp);clearTyping();
  await addDoc(collection(db,'chats',chatId,'messages'),{
    text,senderUid:myUid,createdAt:fsTs(),type:'text',
    nameColor:myData?.nameColor||null,
    bold:fmt.bold,italic:fmt.italic,underline:fmt.underline,
    textColor:fmt.color!=='#000000'?fmt.color:null,
    fontFamily:fmt.font!=='Tahoma'?fmt.font:null,
    fontSize:fmt.size!=='11'?parseInt(fmt.size):null,
  });
  await setDoc(doc(db,'chats',chatId),{participants:[myUid,otherUid],lastMessage:text,lastAt:fsTs()},{merge:true});
};

// ── Nudge ──
window.sendNudge=async()=>{
  const cw=document.getElementById('chatWindow');
  cw.classList.add('nudge-anim');
  setTimeout(()=>cw.classList.remove('nudge-anim'),800);
  playNudgeSound();
  const name=myData?.display||myData?.username;
  await addDoc(collection(db,'chats',chatId,'messages'),{
    text:`${name} enviou uma cutucada!`,
    senderUid:myUid,createdAt:fsTs(),type:'nudge'
  });
  await setDoc(doc(db,'chats',chatId),{participants:[myUid,otherUid],lastMessage:'📳 cutucada',lastAt:fsTs()},{merge:true});
};

// ── Wink ──
window.sendWink=async()=>{
  const winks=['✨','🌟','💫','🎉','🦋','🌸','🎊','🎆'];
  const w=winks[Math.floor(Math.random()*winks.length)];
  const cw=document.getElementById('chatWindow');
  cw.classList.add('wink-anim');
  setTimeout(()=>cw.classList.remove('wink-anim'),900);
  const name=myData?.display||myData?.username;
  await addDoc(collection(db,'chats',chatId,'messages'),{
    text:`${name} enviou um wink! ${w}`,
    senderUid:myUid,createdAt:fsTs(),type:'wink'
  });
  await setDoc(doc(db,'chats',chatId),{participants:[myUid,otherUid],lastMessage:`${w} wink`,lastAt:fsTs()},{merge:true});
};

// ── Image / File ──
window.sendImage=async event=>{
  const file=event.target.files[0];if(!file)return;
  if(file.size>800000){showToast('Imagem muito grande. Máx 800KB.');event.target.value='';return}
  const r=new FileReader();
  r.onload=async e=>{
    await addDoc(collection(db,'chats',chatId,'messages'),{senderUid:myUid,createdAt:fsTs(),type:'image',imageBase64:e.target.result,text:'[imagem]'});
    await setDoc(doc(db,'chats',chatId),{participants:[myUid,otherUid],lastMessage:'[imagem]',lastAt:fsTs()},{merge:true});
  };
  r.readAsDataURL(file);event.target.value='';
};
window.sendFile=async event=>{
  const file=event.target.files[0];if(!file)return;
  if(file.size>500000){showToast('Arquivo muito grande. Máx 500KB.');event.target.value='';return}
  const r=new FileReader();
  r.onload=async e=>{
    await addDoc(collection(db,'chats',chatId,'messages'),{senderUid:myUid,createdAt:fsTs(),type:'file',fileBase64:e.target.result,fileName:file.name,text:'[arquivo]'});
    await setDoc(doc(db,'chats',chatId),{participants:[myUid,otherUid],lastMessage:`📎 ${file.name}`,lastAt:fsTs()},{merge:true});
  };
  r.readAsDataURL(file);event.target.value='';
};
window.downloadFile=(n,b64)=>{const a=document.createElement('a');a.href=b64;a.download=n;a.click()};
window.openLightbox=src=>{document.getElementById('lbImg').src=src;document.getElementById('lightbox').classList.add('show')};

// ── History ──
window.openHistory=async()=>{
  document.getElementById('histModal').classList.add('show');
  const list=document.getElementById('histList');
  list.innerHTML='<div style="padding:10px;text-align:center;color:#999">Carregando...</div>';
  const q=query(collection(db,'chats',chatId,'messages'),orderBy('createdAt','desc'),limit(60));
  const snap=await getDocs(q);
  if(snap.empty){list.innerHTML='<div style="padding:10px;text-align:center;color:#999">Sem histórico ainda.</div>';return}
  list.innerHTML='';
  [...snap.docs].reverse().forEach(d=>{
    const data=d.data();const item=document.createElement('div');
    if(data.type==='nudge'||data.type==='wink'||data.type==='system'){
      item.className='hist-item hi-sys';item.innerHTML=`<span>${escHtml(data.text)}</span>`;
    }else{
      const mine=data.senderUid===myUid;
      const name=mine?(myData?.display||myData?.username):(otherData?.display||otherData?.username||'?');
      const t=data.createdAt?.toDate?data.createdAt.toDate().toLocaleString('pt-BR',{day:'2-digit',month:'2-digit',hour:'2-digit',minute:'2-digit'}):'';
      const txt=data.type==='image'?'[imagem]':data.type==='file'?`📎 ${data.fileName}`:data.text;
      item.className='hist-item '+(mine?'hi-mine':'hi-theirs');
      item.innerHTML=`<span class="hi-name">${escHtml(name)}</span><span class="hi-txt">${escHtml(txt)}</span><span class="hi-t">${t}</span>`;
    }
    list.appendChild(item);
  });
};

// ── Formatting ──
window.toggleFmt=type=>{
  fmt[type]=!fmt[type];
  document.getElementById('btn'+type[0].toUpperCase()+type.slice(1)).classList.toggle('active',fmt[type]);
  document.getElementById('chatInput').focus();
};
window.applyFont=()=>{
  fmt.font=document.getElementById('fontFamSel').value;
  fmt.size=document.getElementById('fontSizeSel').value;
  const inp=document.getElementById('chatInput');
  inp.style.fontFamily=fmt.font;inp.style.fontSize=fmt.size+'px';inp.focus();
};

// ── Emoji panel ──
function buildEmojiPanel(){
  const panel=document.getElementById('emojiPanel');
  EMOJIS.forEach(em=>{
    const s=document.createElement('span');s.className='ep-em';s.textContent=em;
    s.onclick=()=>{ins(em);panel.classList.remove('open')};
    panel.appendChild(s);
  });
}
window.toggleEmojiPanel=()=>{
  document.getElementById('emojiPanel').classList.toggle('open');
  document.getElementById('colorPanel').classList.remove('open');
};

// ── Color panel ──
function buildColorPanel(){
  const panel=document.getElementById('colorPanel');
  COLORS.forEach(col=>{
    const d=document.createElement('div');d.className='cp-c'+(col===fmt.color?' sel':'');
    d.style.background=col;d.title=col;
    d.onclick=()=>{
      fmt.color=col;
      document.querySelectorAll('.cp-c').forEach(e=>e.classList.remove('sel'));
      d.classList.add('sel');
      document.getElementById('colorSwatch').style.background=col;
      document.getElementById('chatInput').style.color=col;
      document.getElementById('chatInput').focus();
    };
    panel.appendChild(d);
  });
}
window.toggleColorPanel=()=>{
  document.getElementById('colorPanel').classList.toggle('open');
  document.getElementById('emojiPanel').classList.remove('open');
};

// ── Typing ──
window.onTyping=()=>{
  if(!myUid)return;
  set(ref(rtdb,`typing/${chatId}/${myUid}`),{typing:true});
  clearTimeout(typingTimeout);typingTimeout=setTimeout(clearTyping,3000);
};
function clearTyping(){
  if(myUid)set(ref(rtdb,`typing/${chatId}/${myUid}`),{typing:false});
  clearTimeout(typingTimeout);
}

// ── Utils ──
window.handleKey=e=>{
  if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();sendMsg();return}
  if((e.ctrlKey||e.metaKey)&&e.key==='b'){e.preventDefault();toggleFmt('bold')}
  if((e.ctrlKey||e.metaKey)&&e.key==='i'){e.preventDefault();toggleFmt('italic')}
  if((e.ctrlKey||e.metaKey)&&e.key==='u'){e.preventDefault();toggleFmt('underline')}
  if((e.ctrlKey||e.metaKey)&&e.key==='e'){e.preventDefault();toggleEmojiPanel()}
};
window.autoResize=el=>{el.style.height='auto';el.style.height=Math.min(el.scrollHeight,110)+'px'};
window.ins=t=>{
  const el=document.getElementById('chatInput');
  const s=el.selectionStart;el.value=el.value.slice(0,s)+t+el.value.slice(s);
  el.focus();autoResize(el);
};
window.goBack=()=>{clearTyping();if(unsubMsgs)unsubMsgs();window.location.href='home.html'};

function playSound(type){
  try{
    const ctx=new(window.AudioContext||window.webkitAudioContext)();
    const note=(f,t,d,v=0.18)=>{
      const o=ctx.createOscillator(),g=ctx.createGain();
      o.connect(g);g.connect(ctx.destination);o.type='sine';
      o.frequency.setValueAtTime(f,ctx.currentTime+t);
      g.gain.setValueAtTime(0,ctx.currentTime+t);
      g.gain.linearRampToValueAtTime(v,ctx.currentTime+t+.01);
      g.gain.exponentialRampToValueAtTime(.001,ctx.currentTime+t+d);
      o.start(ctx.currentTime+t);o.stop(ctx.currentTime+t+d+.05);
    };
    note(523,0,.12);note(659,.13,.12);note(784,.26,.22);
  }catch(e){}
}
function playNudgeSound(){
  try{
    const ctx=new(window.AudioContext||window.webkitAudioContext)();
    [0,.07,.14,.21].forEach((t,i)=>{
      const o=ctx.createOscillator(),g=ctx.createGain();
      o.connect(g);g.connect(ctx.destination);o.type='sine';
      o.frequency.setValueAtTime(i%2===0?700:400,ctx.currentTime+t);
      g.gain.setValueAtTime(.25,ctx.currentTime+t);
      g.gain.exponentialRampToValueAtTime(.001,ctx.currentTime+t+.06);
      o.start(ctx.currentTime+t);o.stop(ctx.currentTime+t+.08);
    });
  }catch(e){}
}
function showToast(msg){
  const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),2500);
}
function escHtml(t){return String(t||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}
