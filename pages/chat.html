<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Conversa — Messenger Online</title>
<link rel="icon" type="image/svg+xml" href="../favicon.svg">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Messenger">
<meta name="theme-color" content="#0a3a78">
<link rel="manifest" href="../manifest.json">
<link rel="apple-touch-icon" href="../favicon.svg">
<style>
@import url('https://fonts.googleapis.com/css2?family=Tahoma&display=swap');
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}

/* ══ FULLSCREEN ══ */
html,body{width:100%;height:100%;min-height:100vh;overflow:hidden;font-family:'Tahoma',Arial,sans-serif;font-size:11px;}
body{
  display:flex;
  background:linear-gradient(135deg,#0e2d6b 0%,#0a246e 50%,#061b58 100%);
}

/* ══ LEFT SIDEBAR: Contact info ══ */
.sidebar{
  width:220px;min-width:180px;flex-shrink:0;
  display:flex;flex-direction:column;
  background:linear-gradient(160deg,#1a5cb8 0%,#2e7dd4 55%,#5ba3e8 100%);
  position:relative;overflow:hidden;
}
.sidebar::after{
  content:'';position:absolute;inset:0;
  background:linear-gradient(to bottom,rgba(255,255,255,.1) 0%,transparent 40%);
  pointer-events:none;
}

/* Back button at top */
.sb-back{
  display:flex;align-items:center;gap:7px;
  padding:8px 10px;cursor:pointer;
  background:rgba(0,0,0,.12);border-bottom:1px solid rgba(255,255,255,.12);
  color:rgba(255,255,255,.85);font-size:11px;
  flex-shrink:0;z-index:1;position:relative;
  transition:background .1s;
}
.sb-back:hover{background:rgba(0,0,0,.22)}
.sb-back-arrow{font-size:14px}

/* Contact card */
.sb-contact{
  padding:18px 14px 14px;flex-shrink:0;
  position:relative;z-index:1;
  border-bottom:1px solid rgba(255,255,255,.15);
}
.sb-avatar-wrap{position:relative;width:64px;margin:0 auto 10px}
.sb-avatar{
  width:64px;height:64px;border-radius:6px;
  border:2px solid rgba(255,255,255,.8);
  background:linear-gradient(135deg,#88aaee,#aabbff);
  display:flex;align-items:center;justify-content:center;
  font-size:34px;overflow:hidden;
  box-shadow:0 3px 10px rgba(0,0,0,.3);
}
.sb-avatar img{width:100%;height:100%;object-fit:cover}
.sb-status-dot{
  position:absolute;bottom:-3px;right:-3px;
  width:14px;height:14px;border-radius:50%;
  border:2px solid #2e7dd4;
}
.s-online{background:#00c800}.s-away{background:#ffaa00}
.s-busy{background:#cc0000}.s-offline{background:#aaa}

.sb-name{
  text-align:center;font-size:13px;font-weight:bold;
  color:#fff;text-shadow:0 1px 3px rgba(0,0,0,.3);
  overflow:hidden;text-overflow:ellipsis;white-space:nowrap;
}
.sb-status-text{text-align:center;font-size:10px;color:rgba(255,255,255,.65);margin-top:3px}
.sb-msg{
  text-align:center;font-size:10px;color:rgba(255,255,255,.7);
  font-style:italic;margin-top:5px;
  overflow:hidden;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;
}
.sb-song{
  text-align:center;font-size:9px;color:rgba(210,180,255,.9);
  margin-top:4px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;
}

/* Sidebar actions */
.sb-actions{
  padding:10px;display:flex;flex-direction:column;gap:6px;
  position:relative;z-index:1;
}
.sb-btn{
  display:flex;align-items:center;gap:7px;
  padding:5px 10px;border-radius:3px;cursor:pointer;
  background:rgba(255,255,255,.12);
  border:1px solid rgba(255,255,255,.15);
  color:rgba(255,255,255,.85);font-size:10px;
  transition:background .1s;
}
.sb-btn:hover{background:rgba(255,255,255,.24)}
.sb-btn:active{background:rgba(255,255,255,.32)}
.sb-btn-icon{font-size:14px;width:18px;text-align:center}

/* Sidebar spacer + WLM butterfly */
.sb-spacer{flex:1}
.sb-butterfly{
  padding:14px;display:flex;flex-direction:column;align-items:center;gap:8px;
  position:relative;z-index:1;
}
.sb-butterfly-icon{
  width:36px;height:36px;
  display:grid;grid-template-columns:1fr 1fr;grid-template-rows:1fr 1fr;gap:2px;
  opacity:.5;
}
.wing{border-radius:60% 5% 60% 5%}
.wing-tr{background:#e8441a;transform:rotate(90deg);border-radius:5% 60% 5% 60%}
.wing-tl{background:#f5a623}
.wing-bl{background:#4a90d9;transform:rotate(180deg);border-radius:5% 60% 5% 60%}
.wing-br{background:#7dc142;transform:rotate(270deg)}
.sb-version{font-size:9px;color:rgba(255,255,255,.3)}

/* ══ CHAT MAIN ══ */
.chat-main{
  flex:1;display:flex;flex-direction:column;
  background:#fff;
  min-width:0;
  border-left:1px solid rgba(255,255,255,.1);
}

/* Title bar */
.title-bar{
  height:22px;flex-shrink:0;
  background:linear-gradient(to bottom,#4a90d9 0%,#2563c0 45%,#1a4fa0 100%);
  display:flex;align-items:center;padding:0 5px;gap:3px;user-select:none;
}
.tb-text{color:#fff;font-size:11px;font-weight:bold;flex:1;text-shadow:1px 1px rgba(0,0,0,.35);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.tb-btn{width:17px;height:15px;background:linear-gradient(to bottom,#e8e8e8,#b8b8b8);border:1px solid #767676;border-radius:2px;cursor:pointer;font-size:9px;font-weight:bold;display:flex;align-items:center;justify-content:center;color:#000;flex-shrink:0}
.tb-btn:hover{background:linear-gradient(to bottom,#fff,#ccc)}
.tb-btn.close:hover{background:linear-gradient(to bottom,#f66,#c00);color:#fff;border-color:#900}

/* Thin info bar below title */
.info-bar{
  height:16px;flex-shrink:0;
  background:linear-gradient(to bottom,#f5f2e8,#ece9d8);
  border-bottom:1px solid #aca899;
  display:flex;align-items:center;padding:0 8px;gap:8px;
}
.info-bar-name{font-size:10px;font-weight:bold;color:#003399}
.info-bar-status{font-size:10px;color:#666}
.info-bar-sep{color:#ccc}

/* Messages area */
.messages-area{
  flex:1;overflow-y:auto;
  background:#fff;
  padding:6px 0;
  min-height:0;
}
/* WLM scrollbar */
.messages-area::-webkit-scrollbar{width:14px}
.messages-area::-webkit-scrollbar-track{background:#f0f0f0;border-left:1px solid #ddd}
.messages-area::-webkit-scrollbar-thumb{background:linear-gradient(to bottom,#d0d0d0,#b0b0b0);border:1px solid #999}
.messages-area::-webkit-scrollbar-thumb:hover{background:linear-gradient(to bottom,#bbb,#999)}

/* ── MESSAGE ROWS ── */
/* WLM 2009: NO bubbles. Plain text, avatar square beside group */
.msg-system{
  text-align:center;color:#aaa;font-style:italic;font-size:10px;
  padding:4px 14px;line-height:1.4;
}
.msg-row{display:flex;align-items:flex-start;gap:7px;padding:3px 12px}
.msg-row.mine{flex-direction:row-reverse}

.msg-row-avatar{
  width:30px;height:30px;border-radius:3px;
  border:1px solid #c0ccee;flex-shrink:0;
  background:linear-gradient(135deg,#88aaee,#aabbff);
  display:flex;align-items:center;justify-content:center;
  font-size:16px;overflow:hidden;margin-top:2px;
}
.msg-row-avatar img{width:100%;height:100%;object-fit:cover}

.msg-block{flex:1;min-width:0;max-width:75%}
.msg-header{display:flex;align-items:baseline;gap:8px;margin-bottom:2px}
.msg-header-name{font-weight:bold;font-size:11px}
.msg-header-time{font-size:9px;color:#aaa}

.msg-line{
  font-size:11px;color:#000;line-height:1.5;
  padding:1px 0;display:flex;align-items:flex-end;gap:4px;
  word-break:break-word;
}
.msg-read{font-size:9px;color:#4a90d9;flex-shrink:0;margin-left:3px}

.msg-img{max-width:180px;max-height:150px;cursor:pointer;border:1px solid #ddd;display:block;margin:2px 0}
.msg-img:hover{opacity:.9}
.msg-file{
  display:inline-flex;align-items:center;gap:5px;
  padding:3px 8px;background:#f0f4ff;border:1px solid #c0ccee;
  cursor:pointer;color:#003399;font-size:10px;border-radius:2px;
}
.msg-file:hover{background:#e0ecff}

/* Date separator */
.date-sep{
  display:flex;align-items:center;gap:10px;
  padding:5px 14px;font-size:9px;color:#bbb;
}
.date-sep::before,.date-sep::after{content:'';flex:1;height:1px;background:#eee}

/* ══ INPUT AREA ══ */
.input-area{
  flex-shrink:0;
  border-top:2px solid #ccd;
  background:linear-gradient(to bottom,#f0ede4,#e8e4d8);
}

/* Toolbar */
.toolbar{
  display:flex;align-items:center;flex-wrap:wrap;gap:1px;
  padding:3px 6px;
  background:linear-gradient(to bottom,#f8f6f0,#ece9d8);
  border-bottom:1px solid #c4c0b0;
  min-height:26px;
}
.tool-sep{width:1px;height:18px;background:#c0bdb0;margin:0 2px}
.tool-btn{
  min-width:22px;height:22px;
  background:linear-gradient(to bottom,#faf8f2,#ece9d8);
  border:1px solid transparent;border-radius:2px;
  cursor:pointer;font-size:11px;
  display:flex;align-items:center;justify-content:center;
  padding:0 3px;color:#333;
  transition:background .08s,border-color .08s;
}
.tool-btn:hover{background:linear-gradient(to bottom,#fff,#ddd);border-color:#aaa}
.tool-btn.active{background:linear-gradient(to bottom,#c8d8f8,#a8c4f0);border-color:#6688cc}

.font-sel{
  font-size:10px;font-family:inherit;
  background:linear-gradient(to bottom,#fff,#f0ede4);
  border:1px solid #bbb;height:20px;
  padding:0 3px;outline:none;
}
.font-sel:focus{border-color:#4a90d9}

.color-swatch{
  width:16px;height:16px;border-radius:2px;
  border:1px solid #999;cursor:pointer;flex-shrink:0;
}

/* Emoji panel */
.emoji-panel{
  display:none;flex-wrap:wrap;gap:2px;
  padding:5px;background:#fff;
  border-bottom:1px solid #ccc;max-height:80px;overflow-y:auto;
}
.emoji-panel.open{display:flex}
.ep-emoji{font-size:18px;cursor:pointer;padding:1px 2px;border-radius:2px}
.ep-emoji:hover{background:#e8f0ff}

/* Color panel */
.color-panel{
  display:none;flex-wrap:wrap;gap:3px;align-items:center;
  padding:4px 8px;background:#fff;
  border-bottom:1px solid #ccc;
}
.color-panel.open{display:flex}
.cp-color{
  width:16px;height:16px;border-radius:2px;
  border:2px solid transparent;cursor:pointer;
}
.cp-color:hover{border-color:#666}
.cp-color.selected{border-color:#000;box-shadow:0 0 0 1px #fff inset}
.cp-label{font-size:10px;color:#666;margin-right:3px}

/* Typing indicator */
.typing-indicator{
  min-height:14px;padding:2px 10px;
  font-size:10px;color:#888;font-style:italic;
  background:#f8f6f0;border-top:1px solid #e0dcd0;
}

/* Input row */
.input-row{display:flex;gap:0;align-items:flex-end;padding:5px 7px;gap:6px}
.chat-textarea{
  flex:1;border:1px solid #bbb;background:#fff;
  padding:5px 7px;
  font-size:11px;font-family:'Tahoma',Arial,sans-serif;
  resize:none;outline:none;
  min-height:32px;max-height:110px;
  overflow-y:auto;line-height:1.45;
}
.chat-textarea:focus{border-color:#4a90d9;box-shadow:0 0 0 2px rgba(74,144,217,.15)}
.chat-textarea::-webkit-scrollbar{width:8px}
.chat-textarea::-webkit-scrollbar-thumb{background:#ccc}
.send-btn{
  font-family:inherit;font-size:11px;font-weight:bold;
  background:linear-gradient(to bottom,#f0ede4,#d8d4c8);
  border:1px solid #999;padding:5px 14px;cursor:pointer;
  white-space:nowrap;align-self:flex-end;height:28px;
  box-shadow:0 1px 2px rgba(0,0,0,.1),inset 0 1px 0 rgba(255,255,255,.7);
}
.send-btn:hover{background:linear-gradient(to bottom,#fff,#e8e4d8);border-color:#666}
.send-btn:active{background:linear-gradient(to bottom,#d0ccc0,#e8e4d8)}

/* Mute button in toolbar */
.mute-chat-btn{
  margin-left:auto;font-size:11px;font-family:inherit;
  background:transparent;border:1px solid transparent;
  padding:2px 5px;cursor:pointer;border-radius:2px;color:#555;
}
.mute-chat-btn:hover{background:#eee;border-color:#bbb}

/* ══ NUDGE / WINK ANIMATIONS ══ */
@keyframes nudge{
  0%{transform:translate(0,0)}10%{transform:translate(-6px,3px)}20%{transform:translate(7px,-3px)}
  30%{transform:translate(-5px,5px)}40%{transform:translate(6px,-2px)}50%{transform:translate(-4px,3px)}
  60%{transform:translate(5px,-4px)}70%{transform:translate(-3px,2px)}80%{transform:translate(4px,-1px)}
  90%{transform:translate(-2px,1px)}100%{transform:translate(0,0)}
}
@keyframes wink{0%{transform:scale(1)}30%{transform:scale(1.025)}60%{transform:scale(.99)}100%{transform:scale(1)}}
.nudge-anim{animation:nudge .7s ease}
.wink-anim{animation:wink .8s ease}

/* ══ LOADING ══ */
.loading-screen{position:fixed;inset:0;background:rgba(10,36,110,.92);display:flex;align-items:center;justify-content:center;z-index:900;flex-direction:column;gap:14px}
.loading-screen.hidden{display:none}
.loading-text{color:#fff;font-size:13px}
.loading-bar{width:160px;height:4px;background:rgba(255,255,255,.2);border-radius:2px;overflow:hidden}
.loading-fill{height:100%;background:#4a90d9;border-radius:2px;animation:fill 1.2s ease forwards}
@keyframes fill{from{width:0%}to{width:100%}}

/* ══ MODALS ══ */
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.42);z-index:500;align-items:center;justify-content:center}
.modal-overlay.show{display:flex}
.modal{background:#ece9d8;border:1px solid #888;box-shadow:4px 4px 14px rgba(0,0,0,.45);width:340px;max-height:92vh;overflow-y:auto;animation:appear .15s ease}
@keyframes appear{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.modal-title{height:22px;background:linear-gradient(to bottom,#4a90d9,#1a4fa0);display:flex;align-items:center;padding:0 6px;gap:4px;position:sticky;top:0;z-index:2}
.modal-title span{color:#fff;font-size:11px;font-weight:bold;flex:1}
.modal-body{padding:12px;display:flex;flex-direction:column;gap:8px}
.modal-btns{display:flex;justify-content:flex-end;gap:6px}
.m-btn{font-size:11px;font-family:inherit;background:linear-gradient(to bottom,#f0ede4,#d8d4c8);border:1px solid #999;padding:3px 14px;cursor:pointer;border-radius:2px}
.m-btn:hover{background:linear-gradient(to bottom,#fff,#e8e4d8)}
.m-btn.primary{background:linear-gradient(to bottom,#4a90d9,#316ac5);color:#fff;border-color:#1a4fa0}
.history-list{display:flex;flex-direction:column;max-height:300px;overflow-y:auto}
.history-item{padding:3px 6px;font-size:11px;display:flex;gap:6px;border-bottom:1px solid #f0f0f0;align-items:baseline}
.h-name{font-weight:bold;min-width:55px;flex-shrink:0;font-size:10px}
.h-text{color:#444;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.h-time{color:#bbb;font-size:9px;flex-shrink:0}
.h-mine .h-name{color:#c00}.h-theirs .h-name{color:#00c}
.h-system{color:#aaa;font-style:italic;justify-content:center;font-size:10px}

/* TOAST */
.toast{position:fixed;top:24px;left:50%;transform:translateX(-50%);background:#333;color:#fff;padding:6px 16px;font-size:11px;border-radius:2px;z-index:700;display:none;white-space:nowrap}
.toast.show{display:block;animation:fadeIn .2s ease}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}

/* ══════════════════
   MOBILE
══════════════════ */
@media(max-width:768px){
  body{overflow:hidden;height:100dvh}
  .sidebar{display:none}
  .chat-main{width:100%;border-left:none}
  .title-bar{
    padding-top:max(0px,env(safe-area-inset-top));
    height:calc(44px + max(0px,env(safe-area-inset-top)));
    align-items:flex-end;padding-bottom:5px;
  }
  .tb-text{font-size:13px}
  .info-bar{height:20px;font-size:11px}
  .msg-row{padding:4px 10px}
  .msg-row-avatar{width:38px;height:38px;font-size:20px;border-radius:50%}
  .msg-line{font-size:13px}
  .msg-header-name{font-size:12px}
  .msg-header-time{font-size:10px}
  .msg-img{max-width:200px;max-height:170px}
  .chat-textarea{font-size:14px;min-height:36px}
  .send-btn{height:34px;font-size:13px;padding:0 14px}
  .toolbar{padding:3px 8px;gap:2px}
  .tool-btn{width:28px;height:26px;font-size:13px}
  .ep-emoji{font-size:22px}
  .input-row{padding:6px 8px;padding-bottom:max(6px,env(safe-area-inset-bottom))}
  .messages-area::-webkit-scrollbar{display:none}
  .emoji-panel{max-height:110px}
}
</style>
</head>
<body>

<!-- LOADING -->
<div class="loading-screen" id="loading">
  <div class="loading-text">💬 Carregando conversa...</div>
  <div class="loading-bar"><div class="loading-fill"></div></div>
</div>

<!-- LEFT SIDEBAR -->
<div class="sidebar">
  <div class="sb-back" onclick="goBack()">
    <span class="sb-back-arrow">◀</span>
    <span>Voltar aos contatos</span>
  </div>
  <div class="sb-contact">
    <div class="sb-avatar-wrap">
      <div class="sb-avatar" id="sbAvatar">😊</div>
      <div class="sb-status-dot s-offline" id="sbStatusDot"></div>
    </div>
    <div class="sb-name" id="sbName">—</div>
    <div class="sb-status-text" id="sbStatusText">Offline</div>
    <div class="sb-msg" id="sbMsg"></div>
    <div class="sb-song" id="sbSong" style="display:none"></div>
  </div>
  <div class="sb-actions">
    <div class="sb-btn" onclick="sendNudge()" title="Cutucada">
      <span class="sb-btn-icon">📳</span> Cutucada
    </div>
    <div class="sb-btn" onclick="sendWink()" title="Wink">
      <span class="sb-btn-icon">✨</span> Enviar Wink
    </div>
    <div class="sb-btn" onclick="document.getElementById('imgInput').click()">
      <span class="sb-btn-icon">🖼️</span> Enviar imagem
    </div>
    <div class="sb-btn" onclick="document.getElementById('fileInput').click()">
      <span class="sb-btn-icon">📎</span> Enviar arquivo
    </div>
    <div class="sb-btn" onclick="openHistory()">
      <span class="sb-btn-icon">📋</span> Histórico
    </div>
    <div class="sb-btn" id="sbMuteBtn" onclick="toggleChatMute()">
      <span class="sb-btn-icon">🔔</span> Silenciar chat
    </div>
  </div>
  <div class="sb-spacer"></div>
  <div class="sb-butterfly">
    <div class="sb-butterfly-icon">
      <div class="wing wing-tl"></div>
      <div class="wing wing-tr"></div>
      <div class="wing wing-bl"></div>
      <div class="wing wing-br"></div>
    </div>
    <div class="sb-version">Messenger Online</div>
  </div>
</div>

<!-- CHAT MAIN -->
<div class="chat-main" id="chatWindow">

  <!-- Title bar (WLM style) -->
  <div class="title-bar">
    <span class="tb-text" id="tbText">💬 Conversa</span>
    <div class="tb-btn" onclick="goBack()">◀</div>
    <div class="tb-btn">_</div>
    <div class="tb-btn">□</div>
    <div class="tb-btn close" onclick="goBack()">✕</div>
  </div>

  <!-- Info bar -->
  <div class="info-bar">
    <span class="info-bar-name" id="infoName">—</span>
    <span class="info-bar-sep">·</span>
    <span class="info-bar-status" id="infoStatus">Offline</span>
  </div>

  <!-- Messages -->
  <div class="messages-area" id="messagesArea">
    <div class="msg-system">Início da conversa. Diga olá! 👋</div>
  </div>

  <!-- Input area -->
  <div class="input-area">
    <!-- Toolbar -->
    <div class="toolbar">
      <!-- Font family -->
      <select class="font-sel" id="fontFamilySel" onchange="applyFont()" title="Fonte">
        <option value="Tahoma">Tahoma</option>
        <option value="Arial">Arial</option>
        <option value="Times New Roman">Times</option>
        <option value="Courier New">Courier</option>
        <option value="Comic Sans MS">Comic</option>
        <option value="Verdana">Verdana</option>
      </select>
      <!-- Font size -->
      <select class="font-sel" id="fontSizeSel" onchange="applyFont()" style="width:38px" title="Tamanho">
        <option value="10">10</option>
        <option value="11" selected>11</option>
        <option value="12">12</option>
        <option value="14">14</option>
        <option value="16">16</option>
        <option value="18">18</option>
        <option value="20">20</option>
      </select>
      <div class="tool-sep"></div>
      <!-- Format -->
      <div class="tool-btn" id="btnBold" title="Negrito (Ctrl+B)" onclick="toggleFmt('bold')"><b>N</b></div>
      <div class="tool-btn" id="btnItalic" title="Itálico (Ctrl+I)" onclick="toggleFmt('italic')"><i>I</i></div>

<!-- ════ SCRIPT ════ -->
<script type="module">
import{initializeApp}from"https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import{getAuth,onAuthStateChanged}from"https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
import{getFirestore,doc,getDoc,getDocs,collection,addDoc,query,orderBy,limit,onSnapshot,serverTimestamp as fsTs,setDoc,updateDoc,arrayUnion}from"https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";
import{getDatabase,ref,set,onValue,serverTimestamp}from"https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

const cfg={apiKey:"AIzaSyDZkMLH3r5Vym9eE1YqHH8R_rWGR6_rWiw",authDomain:"mensageiro-992b3.firebaseapp.com",projectId:"mensageiro-992b3",storageBucket:"mensageiro-992b3.firebasestorage.app",messagingSenderId:"484817145298",appId:"1:484817145298:web:cf5ec0ac2b197f9d2c4c0b",databaseURL:"https://mensageiro-992b3-default-rtdb.firebaseio.com"};
const app=initializeApp(cfg),auth=getAuth(app),db=getFirestore(app),rtdb=getDatabase(app);

const params=new URLSearchParams(window.location.search);
const otherUid=params.get('with');
if(!otherUid){window.location.href='home.html'}

let myUid=null,myData=null,otherData=null,chatId=null,unsubMsgs=null;
let typingTimeout=null,chatMuted=false;

const fmt={bold:false,italic:false,underline:false,color:'#000000',font:'Tahoma',size:'11'};
const CHAT_EMOJIS=['😊','😁','😂','😍','😘','😎','🤔','😢','😤','😴','😜','🤩','👍','👎','❤️','💔','🎉','🎮','🙏','✝️','🌸','🔥','⚽','🎵','😈','👻','💀','🐱','🐶','🦋','😏','🥰','😭','😱','🤣','😅','🙄','😬','🤦','🎸'];
const TEXT_COLORS=['#000000','#cc0000','#003399','#008800','#7755aa','#cc6600','#006688','#aa0066','#555555','#996633','#ff6600','#009900','#6600cc','#cc0099','#0066cc'];

function getChatId(a,b){return[a,b].sort().join('_')}
function getChatMuteKey(){return`mute_chat_${chatId}`}

const NS={
  get muted(){return JSON.parse(localStorage.getItem('notif_muted')?? 'false')},
  get sound(){return JSON.parse(localStorage.getItem('notif_sound')?? 'true')},
  get browser(){return JSON.parse(localStorage.getItem('notif_browser')?? 'false')},
};

window.toggleChatMute=()=>{
  chatMuted=!chatMuted;
  localStorage.setItem(getChatMuteKey(),JSON.stringify(chatMuted));
  const t=chatMuted?'🔕':'🔔';
  document.getElementById('muteChatBtn').textContent=t;
  document.getElementById('sbMuteBtn').innerHTML=`<span class="sb-btn-icon">${t}</span> ${chatMuted?'Ativar notif.':'Silenciar chat'}`;
  showToast(chatMuted?'🔕 Chat silenciado':'🔔 Notificações ativas');
};

function notifyMsg(name,text){
  if(NS.muted||chatMuted)return;
  if(document.hasFocus())return;
  if(NS.sound){
    try{
      const ctx=new(window.AudioContext||window.webkitAudioContext)();
      const note=(f,t,d,v=0.18)=>{const o=ctx.createOscillator(),g=ctx.createGain();o.connect(g);g.connect(ctx.destination);o.type='sine';o.frequency.setValueAtTime(f,ctx.currentTime+t);g.gain.setValueAtTime(0,ctx.currentTime+t);g.gain.linearRampToValueAtTime(v,ctx.currentTime+t+.01);g.gain.exponentialRampToValueAtTime(.001,ctx.currentTime+t+d);o.start(ctx.currentTime+t);o.stop(ctx.currentTime+t+d+.05)};
      note(523,0,.12);note(659,.13,.12);note(784,.26,.22);
    }catch(e){}
  }
  if(NS.browser&&Notification.permission==='granted')
    new Notification(name+' diz:',{body:text,icon:'../favicon.svg',tag:'msg',renotify:true});
  if(!document.hasFocus()){
    let blink=true;const orig=document.title;
    const iv=setInterval(()=>{document.title=blink?'💬 '+name+'...':orig;blink=!blink},900);
    window.addEventListener('focus',()=>{clearInterval(iv);document.title=orig},{once:true});
  }
}

// ── AUTH ──
onAuthStateChanged(auth,async user=>{
  if(!user){window.location.href='../index.html';return}
  myUid=user.uid;chatId=getChatId(myUid,otherUid);
  chatMuted=JSON.parse(localStorage.getItem(getChatMuteKey())?? 'false');
  const bt=chatMuted?'🔕':'🔔';
  document.getElementById('muteChatBtn').textContent=bt;
  document.getElementById('sbMuteBtn').innerHTML=`<span class="sb-btn-icon">${bt}</span> ${chatMuted?'Ativar notif.':'Silenciar chat'}`;

  const[ms,os]=await Promise.all([getDoc(doc(db,'users',myUid)),getDoc(doc(db,'users',otherUid))]);
  if(!ms.exists()||!os.exists()){alert('Erro ao carregar usuários.');window.location.href='home.html';return}
  myData=ms.data();otherData=os.data();

  // Populate sidebar + title
  document.getElementById('tbText').textContent='💬 '+(otherData.display||otherData.username);
  document.getElementById('infoName').textContent=otherData.display||otherData.username;
  const statusMap={online:'Online',away:'Ausente',busy:'Ocupado',offline:'Offline'};
  const statusColor={online:'#00c800',away:'#ffaa00',busy:'#cc0000',offline:'#aaa'};
  const st=otherData.status||'offline';
  document.getElementById('infoStatus').textContent=statusMap[st];
  document.getElementById('infoStatus').style.color=statusColor[st];

  const sbAv=document.getElementById('sbAvatar');
  if(otherData.photoBase64)sbAv.innerHTML=`<img src="${otherData.photoBase64}" alt="">`;
  else sbAv.textContent=otherData.emoji||'😊';
  document.getElementById('sbName').textContent=otherData.display||otherData.username;
  document.getElementById('sbStatusDot').className='sb-status-dot s-'+(st);
  document.getElementById('sbStatusText').textContent=statusMap[st];
  document.getElementById('sbMsg').textContent=otherData.message||'';
  const ss=document.getElementById('sbSong');
  if(otherData.song){ss.textContent='🎵 '+otherData.song;ss.style.display='block'}

  buildEmojiPanel();buildColorPanel();
  if(window.innerWidth<=768)document.getElementById('sendBtn').textContent='➤';

  // Messages listener
  const q=query(collection(db,'chats',chatId,'messages'),orderBy('createdAt'));
  let first=true;
  unsubMsgs=onSnapshot(q,snap=>{
    renderMessages(snap.docs,first);
    if(!first){
      const last=snap.docs[snap.docs.length-1];
      if(last&&last.data().senderUid!==myUid)
        notifyMsg(otherData.display||otherData.username,last.data().text||'📎');
    }
    if(document.hasFocus())markAsRead(snap.docs);
    first=false;
  });

  // Typing listener
  onValue(ref(rtdb,`typing/${chatId}/${otherUid}`),snap=>{
    document.getElementById('typingIndicator').textContent=
      snap.val()?.typing?(otherData.display||otherData.username)+' está digitando...':'';
  });

  window.addEventListener('focus',()=>{
    getDocs(query(collection(db,'chats',chatId,'messages'),orderBy('createdAt'))).then(s=>markAsRead(s.docs));
  });

  document.getElementById('loading').classList.add('hidden');
  document.getElementById('chatInput').focus();
});

async function markAsRead(docs){
  for(const d of docs){
    const data=d.data();
    if(data.senderUid!==myUid&&!(data.readBy||[]).includes(myUid))
      await updateDoc(doc(db,'chats',chatId,'messages',d.id),{readBy:arrayUnion(myUid)});
  }
}

// ── RENDER MESSAGES ──
function renderMessages(docs,skipScroll){
  const area=document.getElementById('messagesArea');
  const wasBottom=area.scrollHeight-area.scrollTop-area.clientHeight<100;
  area.innerHTML='';
  if(!docs.length){area.innerHTML='<div class="msg-system">Início da conversa. Diga olá! 👋</div>';return}

  const groups=[];
  let lastDate='';
  docs.forEach(d=>{
    const data=d.data();
    const mine=data.senderUid===myUid;
    const dateStr=data.createdAt?.toDate?data.createdAt.toDate().toLocaleDateString('pt-BR',{day:'2-digit',month:'2-digit',year:'2-digit'}):'';
    if(dateStr&&dateStr!==lastDate){groups.push({dateSep:dateStr});lastDate=dateStr}
    if(data.type==='system'||data.type==='nudge'||data.type==='wink'){
      groups.push({system:true,data,id:d.id});
    } else {
      const last=groups[groups.length-1];
      if(last&&!last.system&&!last.dateSep&&last.mine===mine){
        last.msgs.push({data,id:d.id});
      } else {
        groups.push({mine,msgs:[{data,id:d.id}]});
      }
    }
  });

  groups.forEach(grp=>{
    if(grp.dateSep){
      const div=document.createElement('div');div.className='date-sep';div.textContent=grp.dateSep;area.appendChild(div);return;
    }
    if(grp.system){
      const div=document.createElement('div');div.className='msg-system';div.textContent=grp.data.text;area.appendChild(div);return;
    }
    const{mine,msgs}=grp;
    const sender=mine?myData:otherData;
    const nameColor=mine?(myData?.nameColor||'#cc0000'):(otherData?.nameColor||'#0033cc');
    const avatarHtml=sender?.photoBase64?`<img src="${sender.photoBase64}" alt="">`:(sender?.emoji||'😊');

    const row=document.createElement('div');
    row.className='msg-row '+(mine?'mine':'theirs');

    const avDiv=document.createElement('div');
    avDiv.className='msg-row-avatar';avDiv.innerHTML=avatarHtml;

    const block=document.createElement('div');block.className='msg-block';

    const firstData=msgs[0].data;
    const t=firstData.createdAt?.toDate
      ?firstData.createdAt.toDate().toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit'}):'';
    const hdr=document.createElement('div');hdr.className='msg-header';
    hdr.innerHTML=`<span class="msg-header-name" style="color:${nameColor}">${escHtml(sender?.display||sender?.username||'?')}</span><span class="msg-header-time">${t}</span>`;
    block.appendChild(hdr);

    msgs.forEach(({data,id})=>{
      let content='';
      if(data.type==='image'){
        content=`<img class="msg-img" src="${data.imageBase64}" alt="imagem" onclick="openLightbox('${data.imageBase64}')">`;
      } else if(data.type==='file'){
        content=`<span class="msg-file" onclick="downloadFile('${data.fileName}','${data.fileBase64}')">📎 ${escHtml(data.fileName)}</span>`;
      } else {
        let txt=escHtml(data.text||'');
        if(data.bold)txt=`<b>${txt}</b>`;
        if(data.italic)txt=`<i>${txt}</i>`;
        if(data.underline)txt=`<u>${txt}</u>`;
        content=txt.replace(/\n/g,'<br>');
      }
      const lineStyle=[];
      if(data.fontFamily)lineStyle.push(`font-family:'${data.fontFamily}'`);
      if(data.fontSize)lineStyle.push(`font-size:${data.fontSize}px`);
      if(data.textColor&&data.textColor!=='#000000')lineStyle.push(`color:${data.textColor}`);
      const sAttr=lineStyle.length?` style="${lineStyle.join(';')}"` :'';
      const readMark=mine?`<span class="msg-read">${(data.readBy||[]).includes(otherUid)?'✓✓':'✓'}</span>`:'';
      const line=document.createElement('div');line.className='msg-line';
      line.innerHTML=`<span${sAttr}>${content}</span>${readMark}`;
      block.appendChild(line);
    });

    if(mine){row.appendChild(block);row.appendChild(avDiv)}
    else{row.appendChild(avDiv);row.appendChild(block)}
    area.appendChild(row);
  });

  if(!skipScroll||wasBottom)area.scrollTop=area.scrollHeight;
}

// ── SEND ──
window.sendMsg=async()=>{
  const input=document.getElementById('chatInput');
  const text=input.value.trim();
  if(!text)return;
  input.value='';autoResize(input);clearTyping();
  await addDoc(collection(db,'chats',chatId,'messages'),{
    text,senderUid:myUid,createdAt:fsTs(),type:'text',
    nameColor:myData?.nameColor||null,
    bold:fmt.bold,italic:fmt.italic,underline:fmt.underline,
    textColor:fmt.color!=='#000000'?fmt.color:null,
    fontFamily:fmt.font!=='Tahoma'?fmt.font:null,
    fontSize:fmt.size!=='11'?parseInt(fmt.size):null,
  });
  await setDoc(doc(db,'chats',chatId),{participants:[myUid,otherUid],lastMessage:text,lastAt:fsTs()},{merge:true});
};

window.sendNudge=async()=>{
  document.getElementById('chatWindow').classList.add('nudge-anim');
  setTimeout(()=>document.getElementById('chatWindow').classList.remove('nudge-anim'),700);
  playNudgeSound();
  await addDoc(collection(db,'chats',chatId,'messages'),{text:`📳 ${myData?.display||myData?.username} enviou uma cutucada!`,senderUid:myUid,createdAt:fsTs(),type:'nudge'});
};

window.sendWink=async()=>{
  const winks=['✨','🌟','💫','🎉','🦋','🌸','🎊','🎆'];
  const w=winks[Math.floor(Math.random()*winks.length)];
  document.getElementById('chatWindow').classList.add('wink-anim');
  setTimeout(()=>document.getElementById('chatWindow').classList.remove('wink-anim'),800);
  await addDoc(collection(db,'chats',chatId,'messages'),{text:`${w} ${myData?.display||myData?.username} enviou um wink! ${w}`,senderUid:myUid,createdAt:fsTs(),type:'wink'});
};

window.sendImage=async event=>{
  const file=event.target.files[0];if(!file)return;
  if(file.size>800000){showToast('Imagem muito grande. Máx 800KB.');event.target.value='';return}
  const r=new FileReader();
  r.onload=async e=>{
    await addDoc(collection(db,'chats',chatId,'messages'),{senderUid:myUid,createdAt:fsTs(),type:'image',imageBase64:e.target.result,text:'[imagem]'});
    await setDoc(doc(db,'chats',chatId),{participants:[myUid,otherUid],lastMessage:'[imagem]',lastAt:fsTs()},{merge:true});
  };
  r.readAsDataURL(file);event.target.value='';
};

window.sendFile=async event=>{
  const file=event.target.files[0];if(!file)return;
  if(file.size>500000){showToast('Arquivo muito grande. Máx 500KB.');event.target.value='';return}
  const r=new FileReader();
  r.onload=async e=>{
    await addDoc(collection(db,'chats',chatId,'messages'),{senderUid:myUid,createdAt:fsTs(),type:'file',fileBase64:e.target.result,fileName:file.name,text:'[arquivo]'});
    await setDoc(doc(db,'chats',chatId),{participants:[myUid,otherUid],lastMessage:`📎 ${file.name}`,lastAt:fsTs()},{merge:true});
  };
  r.readAsDataURL(file);event.target.value='';
};

window.downloadFile=(name,base64)=>{const a=document.createElement('a');a.href=base64;a.download=name;a.click()};
window.openLightbox=src=>{document.getElementById('lightboxImg').src=src;document.getElementById('lightbox').classList.add('show')};

window.openHistory=async()=>{
  document.getElementById('historyModal').classList.add('show');
  const list=document.getElementById('historyList');
  list.innerHTML='<div style="padding:10px;text-align:center;color:#999">Carregando...</div>';
  const q=query(collection(db,'chats',chatId,'messages'),orderBy('createdAt','desc'),limit(60));
  const snap=await getDocs(q);
  if(snap.empty){list.innerHTML='<div style="padding:10px;text-align:center;color:#999">Sem histórico ainda.</div>';return}
  list.innerHTML='';
  [...snap.docs].reverse().forEach(d=>{
    const data=d.data();const item=document.createElement('div');
    if(data.type==='nudge'||data.type==='wink'||data.type==='system'){
      item.className='history-item h-system';item.innerHTML=`<span>${escHtml(data.text)}</span>`;
    }else{
      const mine=data.senderUid===myUid;
      const name=mine?(myData?.display||myData?.username):(otherData?.display||otherData?.username||'?');
      const t=data.createdAt?.toDate?data.createdAt.toDate().toLocaleString('pt-BR',{day:'2-digit',month:'2-digit',hour:'2-digit',minute:'2-digit'}):'';
      const txt=data.type==='image'?'[imagem]':data.type==='file'?`📎 ${data.fileName}`:data.text;
      item.className='history-item '+(mine?'h-mine':'h-theirs');
      item.innerHTML=`<span class="h-name">${escHtml(name)}</span><span class="h-text">${escHtml(txt)}</span><span class="h-time">${t}</span>`;
    }
    list.appendChild(item);
  });
};

// ── FORMATTING ──
window.toggleFmt=type=>{
  fmt[type]=!fmt[type];
  document.getElementById('btn'+type[0].toUpperCase()+type.slice(1)).classList.toggle('active',fmt[type]);
  document.getElementById('chatInput').focus();
};
window.applyFont=()=>{
  fmt.font=document.getElementById('fontFamilySel').value;
  fmt.size=document.getElementById('fontSizeSel').value;
  const inp=document.getElementById('chatInput');
  inp.style.fontFamily=fmt.font;inp.style.fontSize=fmt.size+'px';
  inp.focus();
};

// ── EMOJI PANEL ──
function buildEmojiPanel(){
  const panel=document.getElementById('emojiPanel');
  CHAT_EMOJIS.forEach(em=>{
    const s=document.createElement('span');s.className='ep-emoji';s.textContent=em;
    s.onclick=()=>{ins(em);panel.classList.remove('open')};
    panel.appendChild(s);
  });
}
window.toggleEmojiPanel=()=>{document.getElementById('emojiPanel').classList.toggle('open');document.getElementById('colorPanel').classList.remove('open')};

// ── COLOR PANEL ──
function buildColorPanel(){
  const panel=document.getElementById('colorPanel');
  TEXT_COLORS.forEach(col=>{
    const d=document.createElement('div');d.className='cp-color'+(col===fmt.color?' selected':'');
    d.style.background=col;d.title=col;
    d.onclick=()=>{
      fmt.color=col;
      document.querySelectorAll('.cp-color').forEach(e=>e.classList.remove('selected'));d.classList.add('selected');
      document.getElementById('colorSwatch').style.background=col;
      document.getElementById('chatInput').style.color=col;
      document.getElementById('chatInput').focus();
    };
    panel.appendChild(d);
  });
}
window.toggleColorPanel=()=>{document.getElementById('colorPanel').classList.toggle('open');document.getElementById('emojiPanel').classList.remove('open')};

// ── TYPING ──
window.onTyping=()=>{
  if(!myUid)return;
  set(ref(rtdb,`typing/${chatId}/${myUid}`),{typing:true});
  clearTimeout(typingTimeout);typingTimeout=setTimeout(clearTyping,3000);
};
function clearTyping(){if(myUid)set(ref(rtdb,`typing/${chatId}/${myUid}`),{typing:false});clearTimeout(typingTimeout)}

// ── UTILS ──
window.handleKey=e=>{
  if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();sendMsg()}
  if((e.ctrlKey||e.metaKey)&&e.key==='b'){e.preventDefault();toggleFmt('bold')}
  if((e.ctrlKey||e.metaKey)&&e.key==='i'){e.preventDefault();toggleFmt('italic')}
  if((e.ctrlKey||e.metaKey)&&e.key==='u'){e.preventDefault();toggleFmt('underline')}
  if((e.ctrlKey||e.metaKey)&&e.key==='e'){e.preventDefault();toggleEmojiPanel()}
};
window.autoResize=el=>{el.style.height='auto';el.style.height=Math.min(el.scrollHeight,110)+'px'};
window.ins=t=>{const el=document.getElementById('chatInput');const s=el.selectionStart;el.value=el.value.slice(0,s)+t+el.value.slice(s);el.focus();autoResize(el)};
window.goBack=()=>{clearTyping();if(unsubMsgs)unsubMsgs();window.location.href='home.html'};
function playNudgeSound(){
  try{
    const ctx=new(window.AudioContext||window.webkitAudioContext)();
    [0,.07,.14,.21].forEach((t,i)=>{const o=ctx.createOscillator(),g=ctx.createGain();o.connect(g);g.connect(ctx.destination);o.type='sine';o.frequency.setValueAtTime(i%2===0?700:400,ctx.currentTime+t);g.gain.setValueAtTime(.25,ctx.currentTime+t);g.gain.exponentialRampToValueAtTime(.001,ctx.currentTime+t+.06);o.start(ctx.currentTime+t);o.stop(ctx.currentTime+t+.07)});
  }catch(e){}
}
function showToast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2500)}
function escHtml(t){return String(t||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}
</script>
