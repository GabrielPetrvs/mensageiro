<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Conversa — Messenger Online</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Tahoma&display=swap');
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Tahoma', Arial, sans-serif; font-size: 11px;
    background: #1a3a6e;
    background-image:
      radial-gradient(ellipse at 20% 50%, #2a5298 0%, transparent 55%),
      radial-gradient(ellipse at 80% 20%, #0d47a1 0%, transparent 55%);
    display: flex; justify-content: center; align-items: flex-start;
    min-height: 100vh; padding: 20px;
  }

  .chat-window {
    width: 460px; height: 520px;
    background: #fff; border: 1px solid #888;
    box-shadow: 3px 3px 10px rgba(0,0,0,.5);
    display: flex; flex-direction: column;
    animation: appear 0.2s ease;
  }
  @keyframes appear { from { opacity:0; transform:translateY(10px); } to { opacity:1; transform:translateY(0); } }

  .title-bar {
    height: 22px;
    background: linear-gradient(to bottom, #4a90d9 0%, #2563c0 50%, #1a4fa0 100%);
    display: flex; align-items: center; padding: 0 5px; gap: 4px; user-select: none; flex-shrink: 0;
  }
  .tb-text { color: #fff; font-size: 11px; font-weight: bold; flex: 1; text-shadow: 1px 1px rgba(0,0,0,.4); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .tb-btn {
    width: 16px; height: 14px;
    background: linear-gradient(to bottom, #e8e8e8, #b8b8b8);
    border: 1px solid #888; border-radius: 2px; cursor: pointer;
    font-size: 9px; font-weight: bold;
    display: flex; align-items: center; justify-content: center; color: #333; flex-shrink: 0;
  }
  .tb-btn:hover { background: linear-gradient(to bottom, #fff, #ccc); }
  .tb-btn.close:hover { background: linear-gradient(to bottom, #ff6666, #cc0000); color: #fff; }

  /* ===== CHAT HEADER ===== */
  .chat-header {
    background: linear-gradient(to right, #ccdaff, #e8f0ff);
    border-bottom: 1px solid #99aacc; padding: 6px 10px;
    display: flex; align-items: center; gap: 8px; flex-shrink: 0;
  }
  .ch-avatar {
    width: 36px; height: 36px; border: 2px solid #6688cc;
    background: linear-gradient(135deg, #88aaee, #aabbff);
    display: flex; align-items: center; justify-content: center; font-size: 20px; flex-shrink: 0;
  }
  .ch-name  { font-size: 13px; font-weight: bold; color: #003399; }
  .ch-msg   { font-size: 10px; color: #666; font-style: italic; }
  .ch-status{ font-size: 10px; color: #888; }

  .back-btn {
    margin-left: auto; font-size: 10px; font-family: inherit;
    background: linear-gradient(to bottom, #e8e4d8, #c8c4b4);
    border: 1px solid #999; padding: 2px 8px; cursor: pointer; border-radius: 2px; flex-shrink: 0;
  }
  .back-btn:hover { background: linear-gradient(to bottom, #fff, #ddd); }

  /* ===== MESSAGES ===== */
  .messages-area {
    flex: 1; overflow-y: auto; padding: 8px; background: #fff;
    display: flex; flex-direction: column; gap: 5px;
  }
  .messages-area::-webkit-scrollbar { width: 12px; }
  .messages-area::-webkit-scrollbar-track { background: #f0f0f0; }
  .messages-area::-webkit-scrollbar-thumb { background: linear-gradient(to bottom, #c8c8c8, #a0a0a0); border: 1px solid #888; }

  .msg-group { display: flex; flex-direction: column; gap: 2px; max-width: 90%; }
  .msg-group.mine  { align-self: flex-end; align-items: flex-end; }
  .msg-group.theirs{ align-self: flex-start; }

  .msg-meta { font-size: 10px; font-weight: bold; display: flex; align-items: center; gap: 6px; }
  .msg-meta .time { font-weight: normal; color: #aaa; font-size: 9px; }
  .mine  .msg-meta { color: #cc0000; }
  .theirs .msg-meta { color: #0033cc; }

  .msg-bubble {
    padding: 4px 8px; font-size: 11px; line-height: 1.5; word-break: break-word;
    border: 1px solid #c0ccee; background: #f0f4ff;
  }
  .mine .msg-bubble   { background: #fff8f0; border-color: #eeccaa; }
  .theirs .msg-bubble { background: #f0f4ff; border-color: #c0ccee; }

  .msg-system {
    text-align: center; color: #aaa; font-size: 10px; font-style: italic;
    padding: 4px 0;
  }

  .typing-indicator { color: #888; font-size: 10px; font-style: italic; padding: 2px 8px; min-height: 16px; }

  /* ===== INPUT ===== */
  .input-area { border-top: 1px solid #ccc; background: #ece9d8; flex-shrink: 0; }

  .toolbar { padding: 2px 4px; border-bottom: 1px solid #c0c0c0; display: flex; gap: 2px; }
  .tool-btn {
    width: 22px; height: 20px; cursor: pointer;
    border: 1px solid transparent; background: transparent;
    display: flex; align-items: center; justify-content: center;
    font-size: 12px; border-radius: 2px;
  }
  .tool-btn:hover { background: #fff; border-color: #aaa; }

  .input-row { display: flex; padding: 5px; gap: 5px; }
  .chat-input {
    flex: 1; border: 1px solid #aaa; padding: 4px 6px;
    font-family: inherit; font-size: 11px; resize: none; height: 50px;
    outline: none; background: #fff; line-height: 1.4;
  }
  .chat-input:focus { border-color: #4a90d9; }
  .send-btn {
    font-size: 11px; font-family: inherit; font-weight: bold;
    background: linear-gradient(to bottom, #4a90d9, #1a4fa0);
    color: #fff; border: 1px solid #1a4fa0; padding: 0 12px;
    cursor: pointer; border-radius: 2px; align-self: flex-end; height: 26px;
  }
  .send-btn:hover { background: linear-gradient(to bottom, #5aa0e9, #2a5fb0); }
  .send-btn:active { background: linear-gradient(to bottom, #1a4fa0, #0d3580); }

  /* ===== NUDGE ===== */
  .nudge-anim { animation: nudge 0.15s ease-in-out 4; }
  @keyframes nudge {
    0%,100% { transform: translateX(0) rotate(0); }
    25% { transform: translateX(-6px) rotate(-1deg); }
    75% { transform: translateX(6px) rotate(1deg); }
  }

  /* ===== LOADING ===== */
  .loading-screen {
    position: fixed; inset: 0; background: rgba(26,58,110,0.9);
    display: flex; align-items: center; justify-content: center; z-index: 999; flex-direction: column; gap: 12px;
  }
  .loading-screen.hidden { display: none; }
  .loading-text { color: #fff; font-size: 13px; }
</style>
</head>
<body>

<div class="loading-screen" id="loading">
  <div class="loading-text">🦋 Abrindo conversa...</div>
</div>

<div class="chat-window" id="chatWindow">
  <div class="title-bar">
    <span style="font-size:12px">🦋</span>
    <span class="tb-text" id="tbText">Conversa</span>
    <div class="tb-btn close" onclick="goBack()">✕</div>
  </div>

  <div class="chat-header">
    <div class="ch-avatar" id="chAvatar">😊</div>
    <div>
      <div class="ch-name"   id="chName">...</div>
      <div class="ch-msg"    id="chMsg"></div>
      <div class="ch-status" id="chStatus"></div>
    </div>
    <button class="back-btn" onclick="goBack()">◄ Voltar</button>
  </div>

  <div class="messages-area" id="messagesArea">
    <div class="msg-system">Início da conversa. Diga olá! 👋</div>
  </div>

  <div class="typing-indicator" id="typingIndicator"></div>

  <div class="input-area">
    <div class="toolbar">
      <div class="tool-btn" title="Negrito" onclick="wrapText('**','**')"><b>N</b></div>
      <div class="tool-btn" title="Itálico" onclick="wrapText('_','_')"><i>I</i></div>
      <div class="tool-btn" title=";)" onclick="ins(';) ')">😉</div>
      <div class="tool-btn" title=":)" onclick="ins(':) ')">😊</div>
      <div class="tool-btn" title=":D" onclick="ins(':D ')">😄</div>
      <div class="tool-btn" title=":(" onclick="ins(':( ')">😢</div>
      <div class="tool-btn" title="kk" onclick="ins('kkkk ')">😂</div>
      <div class="tool-btn" title="Nudge" onclick="sendNudge()">📳</div>
    </div>
    <div class="input-row">
      <textarea class="chat-input" id="chatInput"
        placeholder="Escreva uma mensagem... (Enter para enviar)"
        onkeydown="handleKey(event)"
        oninput="onTyping()"></textarea>
      <button class="send-btn" onclick="sendMsg()">Enviar</button>
    </div>
  </div>
</div>

<script type="module">
import { auth, db, rtdb } from '../js/firebase-config.js';
import { onAuthStateChanged }
  from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
import {
  doc, getDoc, collection, addDoc, query, orderBy,
  onSnapshot, serverTimestamp as fsTimestamp, updateDoc, setDoc
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";
import { ref, set, onValue, serverTimestamp }
  from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

const params   = new URLSearchParams(window.location.search);
const otherUid = params.get('with');
if (!otherUid) window.location.href = 'home.html';

let myUid = null, myData = null, otherData = null;
let chatId = null;
let typingTimeout = null;
let unsubMsgs = null;

function getChatId(a, b) {
  return [a, b].sort().join('_');
}

// ===== AUTH GUARD =====
onAuthStateChanged(auth, async user => {
  if (!user) { window.location.href = '../index.html'; return; }
  myUid  = user.uid;
  chatId = getChatId(myUid, otherUid);

  const [mySnap, otherSnap] = await Promise.all([
    getDoc(doc(db, 'users', myUid)),
    getDoc(doc(db, 'users', otherUid))
  ]);

  if (!mySnap.exists() || !otherSnap.exists()) {
    alert('Usuário não encontrado.'); window.location.href = 'home.html'; return;
  }

  myData    = mySnap.data();
  otherData = otherSnap.data();

  document.getElementById('tbText').textContent  = `Conversa com ${otherData.display || otherData.username}`;
  document.getElementById('chAvatar').textContent = otherData.emoji || '😊';
  document.getElementById('chName').textContent   = otherData.display || otherData.username;
  document.getElementById('chMsg').textContent    = otherData.message || '';
  document.getElementById('chStatus').textContent =
    { online:'● Online', away:'● Ausente', busy:'● Ocupado', offline:'● Offline' }[otherData.status||'offline'];

  // Listen for messages
  const msgsRef = collection(db, 'chats', chatId, 'messages');
  const q = query(msgsRef, orderBy('createdAt'));
  unsubMsgs = onSnapshot(q, snap => {
    renderMessages(snap.docs);
  });

  // Listen for typing
  const typRef = ref(rtdb, `typing/${chatId}/${otherUid}`);
  onValue(typRef, snap => {
    const typing = snap.val();
    document.getElementById('typingIndicator').textContent =
      (typing?.typing) ? `${otherData.display || otherData.username} está digitando...` : '';
  });

  document.getElementById('loading').classList.add('hidden');
  document.getElementById('chatInput').focus();
});

// ===== RENDER MESSAGES =====
function renderMessages(docs) {
  const area = document.getElementById('messagesArea');
  const wasAtBottom = area.scrollHeight - area.scrollTop - area.clientHeight < 60;

  area.innerHTML = '';

  if (docs.length === 0) {
    area.innerHTML = '<div class="msg-system">Início da conversa. Diga olá! 👋</div>';
    return;
  }

  docs.forEach(d => {
    const data = d.data();
    if (data.type === 'system' || data.type === 'nudge') {
      const div = document.createElement('div');
      div.className = 'msg-system';
      div.textContent = data.text;
      area.appendChild(div);
      return;
    }

    const mine = data.senderUid === myUid;
    const name = mine ? (myData?.display || myData?.username) : (otherData?.display || otherData?.username);
    const time = data.createdAt?.toDate
      ? data.createdAt.toDate().toLocaleTimeString('pt-BR', { hour:'2-digit', minute:'2-digit' })
      : '';

    const grp = document.createElement('div');
    grp.className = 'msg-group ' + (mine ? 'mine' : 'theirs');
    grp.innerHTML = `
      <div class="msg-meta">${escHtml(name)} <span class="time">${time}</span></div>
      <div class="msg-bubble">${escHtml(data.text)}</div>
    `;
    area.appendChild(grp);
  });

  if (wasAtBottom) area.scrollTop = area.scrollHeight;
}

// ===== SEND MESSAGE =====
window.sendMsg = async function() {
  const input = document.getElementById('chatInput');
  const text  = input.value.trim();
  if (!text || !myUid) return;

  input.value = '';
  clearTyping();

  const msgsRef = collection(db, 'chats', chatId, 'messages');
  await addDoc(msgsRef, {
    text,
    senderUid: myUid,
    createdAt: fsTimestamp(),
    type: 'text'
  });

  // Update chat metadata
  await setDoc(doc(db, 'chats', chatId), {
    participants: [myUid, otherUid],
    lastMessage: text,
    lastAt: fsTimestamp()
  }, { merge: true });
};

// ===== NUDGE =====
window.sendNudge = async function() {
  document.getElementById('chatWindow').classList.add('nudge-anim');
  setTimeout(() => document.getElementById('chatWindow').classList.remove('nudge-anim'), 700);

  const msgsRef = collection(db, 'chats', chatId, 'messages');
  await addDoc(msgsRef, {
    text: `📳 ${myData?.display || myData?.username} enviou uma cutucada!`,
    senderUid: myUid,
    createdAt: fsTimestamp(),
    type: 'nudge'
  });
};

// ===== TYPING =====
window.onTyping = function() {
  if (!myUid) return;
  set(ref(rtdb, `typing/${chatId}/${myUid}`), { typing: true });
  clearTimeout(typingTimeout);
  typingTimeout = setTimeout(clearTyping, 3000);
};

function clearTyping() {
  if (myUid) set(ref(rtdb, `typing/${chatId}/${myUid}`), { typing: false });
  clearTimeout(typingTimeout);
}

// ===== KEY HANDLER =====
window.handleKey = function(e) {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); window.sendMsg(); }
};

// ===== TOOLBAR HELPERS =====
window.wrapText = function(before, after) {
  const el = document.getElementById('chatInput');
  const s = el.selectionStart, e2 = el.selectionEnd;
  const v = el.value;
  el.value = v.slice(0,s) + before + v.slice(s,e2) + after + v.slice(e2);
  el.focus();
};

window.ins = function(text) {
  const el = document.getElementById('chatInput');
  const s = el.selectionStart;
  el.value = el.value.slice(0,s) + text + el.value.slice(s);
  el.focus();
};

// ===== BACK =====
window.goBack = function() {
  clearTyping();
  if (unsubMsgs) unsubMsgs();
  window.location.href = 'home.html';
};

function escHtml(t) {
  return String(t||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/\n/g,'<br>');
}
</script>
</body>
</html>
