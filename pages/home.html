<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Messenger Online</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Tahoma&display=swap');
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Tahoma', Arial, sans-serif;
    font-size: 11px;
    background: #1a3a6e;
    background-image:
      radial-gradient(ellipse at 20% 50%, #2a5298 0%, transparent 55%),
      radial-gradient(ellipse at 80% 20%, #0d47a1 0%, transparent 55%);
    display: flex; justify-content: center; align-items: flex-start;
    min-height: 100vh; padding: 20px;
    gap: 12px;
  }

  .msn-window {
    width: 280px; min-height: 580px;
    background: #fff;
    border: 1px solid #888;
    box-shadow: 3px 3px 10px rgba(0,0,0,.5), inset 0 0 0 1px #ddd;
    display: flex; flex-direction: column;
    animation: appear 0.2s ease;
  }
  @keyframes appear { from { opacity:0; transform:translateY(10px); } to { opacity:1; transform:translateY(0); } }

  .title-bar {
    height: 22px;
    background: linear-gradient(to bottom, #4a90d9 0%, #2563c0 50%, #1a4fa0 100%);
    display: flex; align-items: center; padding: 0 5px; gap: 4px; user-select: none; flex-shrink: 0;
  }
  .tb-text { color: #fff; font-size: 11px; font-weight: bold; flex: 1; text-shadow: 1px 1px rgba(0,0,0,.4); }
  .tb-btn {
    width: 16px; height: 14px;
    background: linear-gradient(to bottom, #e8e8e8, #b8b8b8);
    border: 1px solid #888; border-radius: 2px; cursor: pointer;
    font-size: 9px; font-weight: bold;
    display: flex; align-items: center; justify-content: center; color: #333;
  }
  .tb-btn:hover { background: linear-gradient(to bottom, #fff, #ccc); }
  .tb-btn.close:hover { background: linear-gradient(to bottom, #ff6666, #cc0000); color: #fff; }

  .menu-bar {
    height: 18px; background: #ece9d8; border-bottom: 1px solid #aca899;
    display: flex; align-items: center; padding: 0 4px; gap: 8px; flex-shrink: 0;
  }
  .menu-item { font-size: 11px; color: #000; cursor: pointer; padding: 1px 4px; border-radius: 2px; }
  .menu-item:hover { background: #316ac5; color: #fff; }

  /* ===== MY PROFILE ===== */
  .msn-header {
    background: linear-gradient(to bottom, #e8f0ff, #ccdaff);
    padding: 8px; border-bottom: 1px solid #99aacc; flex-shrink: 0;
  }
  .my-profile { display: flex; align-items: center; gap: 8px; margin-bottom: 6px; }
  .avatar-wrap { position: relative; width: 48px; height: 48px; flex-shrink: 0; }
  .avatar {
    width: 48px; height: 48px;
    border: 2px solid #6688cc;
    background: linear-gradient(135deg, #4a90e2, #7b68ee);
    display: flex; align-items: center; justify-content: center;
    font-size: 26px; cursor: pointer; overflow: hidden;
  }
  .status-dot {
    position: absolute; bottom: 1px; right: 1px;
    width: 10px; height: 10px; border-radius: 50%; border: 1px solid #fff;
  }
  .my-info { flex: 1; min-width: 0; }
  .my-name {
    font-size: 12px; font-weight: bold; color: #003399;
    cursor: pointer; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
  }
  .my-name:hover { text-decoration: underline; }
  .my-msg {
    font-size: 10px; color: #666; font-style: italic;
    cursor: pointer; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
  }
  .my-msg:hover { color: #003399; }
  .status-sel { font-size: 10px; border: 1px solid #99aacc; background: #fff; padding: 1px 2px; color: #333; font-family: inherit; cursor: pointer; margin-top: 3px; }

  /* ===== SEARCH ===== */
  .search-bar {
    background: #ece9d8; border-bottom: 1px solid #aca899;
    padding: 3px 6px; display: flex; align-items: center; gap: 4px; flex-shrink: 0;
  }
  .search-input {
    flex: 1; border: 1px solid #aaa; padding: 1px 4px;
    font-size: 10px; font-family: inherit; background: #fff; outline: none;
  }
  .search-input:focus { border-color: #4a90d9; }

  /* ===== CONTACTS ===== */
  .contacts-area { flex: 1; overflow-y: auto; background: #fff; }
  .contacts-area::-webkit-scrollbar { width: 12px; }
  .contacts-area::-webkit-scrollbar-track { background: #f0f0f0; }
  .contacts-area::-webkit-scrollbar-thumb { background: linear-gradient(to bottom, #c8c8c8, #a0a0a0); border: 1px solid #888; }

  .group-header {
    background: linear-gradient(to bottom, #e8e4d8, #d8d4c8);
    border-top: 1px solid #c8c4b8; border-bottom: 1px solid #b8b4a8;
    padding: 2px 6px; cursor: pointer;
    display: flex; align-items: center; gap: 4px; user-select: none;
  }
  .group-arrow { font-size: 8px; color: #666; transition: transform 0.15s; }
  .group-arrow.col { transform: rotate(-90deg); }
  .group-name { font-size: 11px; color: #333; font-weight: bold; }
  .group-count { font-size: 10px; color: #888; margin-left: auto; }
  .group-list { }
  .group-list.hidden { display: none; }

  .contact-item {
    display: flex; align-items: center; gap: 6px;
    padding: 3px 8px 3px 16px; cursor: pointer;
    border-bottom: 1px solid #f4f4f4; transition: background 0.1s;
  }
  .contact-item:hover { background: #dce8ff; }
  .contact-avatar {
    width: 28px; height: 28px;
    border: 1px solid #aabbdd;
    background: linear-gradient(135deg, #88aaee, #aabbff);
    display: flex; align-items: center; justify-content: center;
    font-size: 14px; flex-shrink: 0; position: relative; overflow: hidden;
  }
  .c-dot { position: absolute; bottom: 0; right: 0; width: 8px; height: 8px; border-radius: 50%; border: 1px solid #fff; }
  .contact-info { flex: 1; min-width: 0; }
  .c-name { font-size: 11px; font-weight: bold; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .c-msg  { font-size: 10px; color: #888; font-style: italic; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .unread-badge { background: #cc0000; color: #fff; font-size: 9px; font-weight: bold; border-radius: 8px; padding: 0 4px; margin-left: 4px; }

  .s-online { background: #00c800; }
  .s-away   { background: #ffaa00; }
  .s-busy   { background: #cc0000; }
  .s-offline{ background: #aaa; }

  /* ===== ADD CONTACT ===== */
  .add-contact-bar {
    background: #ece9d8; border-top: 1px solid #aca899;
    padding: 4px 6px; display: flex; gap: 4px; flex-shrink: 0;
  }
  .add-input { flex: 1; border: 1px solid #aaa; padding: 2px 4px; font-size: 10px; font-family: inherit; background: #fff; outline: none; }
  .add-input:focus { border-color: #4a90d9; }
  .add-btn {
    font-size: 10px; font-family: inherit;
    background: linear-gradient(to bottom, #e8e4d8, #c8c4b4);
    border: 1px solid #999; padding: 0 8px; cursor: pointer; border-radius: 2px;
  }
  .add-btn:hover { background: linear-gradient(to bottom, #fff, #ddd); }

  /* ===== FOOTER ===== */
  .msn-footer {
    height: 22px; background: linear-gradient(to bottom, #ece9d8, #d4d0c8);
    border-top: 1px solid #aca899;
    display: flex; align-items: center; padding: 0 6px; gap: 6px; flex-shrink: 0;
  }
  .f-btn { font-size: 10px; color: #333; cursor: pointer; padding: 1px 4px; border-radius: 2px; border: 1px solid transparent; }
  .f-btn:hover { border-color: #aaa; background: #fff; }

  /* ===== NOTIFICATION ===== */
  .notif-popup {
    position: fixed; bottom: 20px; right: 20px; z-index: 500;
    background: linear-gradient(to bottom, #e8f0ff, #ccdaff);
    border: 1px solid #6688cc; padding: 10px 14px;
    box-shadow: 2px 2px 8px rgba(0,0,0,.3);
    font-size: 11px; display: none; max-width: 220px; cursor: pointer;
    animation: slideUp 0.2s ease;
  }
  .notif-popup.show { display: block; }
  @keyframes slideUp { from { opacity:0; transform:translateY(8px); } to { opacity:1; transform:translateY(0); } }
  .notif-name { font-weight: bold; color: #003399; }
  .notif-msg  { color: #333; margin-top: 2px; }

  /* ===== EDIT PROFILE ===== */
  .modal-overlay {
    display: none; position: fixed; inset: 0;
    background: rgba(0,0,0,.35); z-index: 400;
    align-items: center; justify-content: center;
  }
  .modal-overlay.show { display: flex; }
  .modal {
    background: #ece9d8; border: 1px solid #888;
    box-shadow: 3px 3px 10px rgba(0,0,0,.4); width: 270px;
    animation: appear 0.15s ease;
  }
  .modal-title {
    height: 22px; background: linear-gradient(to bottom, #4a90d9, #1a4fa0);
    display: flex; align-items: center; padding: 0 6px; gap: 4px;
  }
  .modal-title span { color: #fff; font-size: 11px; font-weight: bold; flex: 1; }
  .modal-body { padding: 14px; display: flex; flex-direction: column; gap: 10px; }
  .m-label { font-size: 11px; color: #333; margin-bottom: 2px; }
  .m-input { width: 100%; border: 1px solid #aaa; padding: 3px 5px; font-size: 11px; font-family: inherit; background: #fff; outline: none; }
  .m-input:focus { border-color: #4a90d9; }
  .emoji-picker { display: flex; flex-wrap: wrap; gap: 6px; }
  .emoji-opt { font-size: 20px; cursor: pointer; padding: 2px; border: 2px solid transparent; border-radius: 3px; }
  .emoji-opt:hover { background: #ddd; }
  .emoji-opt.selected { border-color: #4a90d9; background: #e8f0ff; }
  .modal-btns { display: flex; justify-content: flex-end; gap: 6px; }
  .m-btn { font-size: 11px; font-family: inherit; background: linear-gradient(to bottom, #e8e4d8, #c8c4b4); border: 1px solid #999; padding: 2px 14px; cursor: pointer; border-radius: 2px; }
  .m-btn:hover { background: linear-gradient(to bottom, #fff, #ddd); }
  .m-btn.primary { background: linear-gradient(to bottom, #4a90d9, #1a4fa0); color: #fff; border-color: #1a4fa0; }
  .m-btn.primary:hover { background: linear-gradient(to bottom, #5aa0e9, #2a5fb0); }

  .empty-contacts { padding: 20px; text-align: center; color: #999; font-size: 11px; }

  /* ===== LOADING ===== */
  .loading-screen {
    position: fixed; inset: 0; background: rgba(26,58,110,0.9);
    display: flex; align-items: center; justify-content: center; z-index: 999; flex-direction: column; gap: 12px;
  }
  .loading-screen.hidden { display: none; }
  .loading-text { color: #fff; font-size: 13px; }
  .loading-bar { width: 160px; height: 4px; background: rgba(255,255,255,0.2); border-radius: 2px; overflow: hidden; }
  .loading-fill { height: 100%; background: #4a90d9; border-radius: 2px; animation: fill 1.5s ease forwards; }
  @keyframes fill { from { width:0%; } to { width:100%; } }
</style>
</head>
<body>

<!-- Loading -->
<div class="loading-screen" id="loading">
  <div class="loading-text">🦋 Conectando ao Messenger...</div>
  <div class="loading-bar"><div class="loading-fill"></div></div>
</div>

<!-- Main Window -->
<div class="msn-window">
  <div class="title-bar">
    <span style="font-size:12px">🦋</span>
    <span class="tb-text">Messenger Online</span>
    <div class="tb-btn">_</div>
    <div class="tb-btn">□</div>
    <div class="tb-btn close" onclick="doSignOut()">✕</div>
  </div>

  <div class="menu-bar">
    <span class="menu-item">Arquivo</span>
    <span class="menu-item" onclick="openEdit()">Perfil</span>
    <span class="menu-item" onclick="doSignOut()">Sair</span>
  </div>

  <div class="msn-header">
    <div class="my-profile">
      <div class="avatar-wrap">
        <div class="avatar" id="myAvatar" onclick="openEdit()">😊</div>
        <div class="status-dot s-online" id="myStatusDot"></div>
      </div>
      <div class="my-info">
        <div class="my-name" id="myName" onclick="openEdit()">Carregando...</div>
        <div class="my-msg"  id="myMsg"  onclick="openEdit()">...</div>
        <select class="status-sel" id="statusSel" onchange="changeStatus()">
          <option value="online">🟢 Online</option>
          <option value="away">🟡 Ausente</option>
          <option value="busy">🔴 Ocupado</option>
          <option value="offline">⚫ Aparecer off</option>
        </select>
      </div>
    </div>
  </div>

  <div class="search-bar">
    <span>🔍</span>
    <input class="search-input" type="text" id="searchInput" placeholder="Procurar contato..." oninput="renderContacts()">
  </div>

  <div class="contacts-area" id="contactsArea">
    <div class="empty-contacts">Carregando contatos...</div>
  </div>

  <div class="add-contact-bar">
    <input class="add-input" type="text" id="addInput" placeholder="Adicionar: nome de usuário">
    <button class="add-btn" onclick="addContact()">+ Adicionar</button>
  </div>

  <div class="msn-footer">
    <div class="f-btn" id="footerStatus">● Online</div>
    <div style="margin-left:auto; font-size:10px; color:#666;" id="footerUser"></div>
  </div>
</div>

<!-- Notification -->
<div class="notif-popup" id="notifPopup" onclick="handleNotifClick()">
  <div class="notif-name" id="notifName"></div>
  <div class="notif-msg"  id="notifMsg"></div>
</div>

<!-- Edit Profile Modal -->
<div class="modal-overlay" id="editModal">
  <div class="modal">
    <div class="modal-title">
      <span>Editar perfil</span>
      <div class="tb-btn close" onclick="closeEdit()">✕</div>
    </div>
    <div class="modal-body">
      <div>
        <div class="m-label">Emoji (clique para escolher):</div>
        <div class="emoji-picker" id="emojiPicker"></div>
      </div>
      <div>
        <div class="m-label">Nome de exibição:</div>
        <input class="m-input" type="text" id="editDisplay" maxlength="40">
      </div>
      <div>
        <div class="m-label">Recado pessoal:</div>
        <input class="m-input" type="text" id="editMsg" maxlength="80">
      </div>
      <div class="modal-btns">
        <button class="m-btn" onclick="closeEdit()">Cancelar</button>
        <button class="m-btn primary" onclick="saveProfile()">Salvar</button>
      </div>
    </div>
  </div>
</div>

<script type="module">
import { auth, db, rtdb } from '../js/firebase-config.js';
import { onAuthStateChanged, signOut }
  from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
import {
  doc, getDoc, setDoc, updateDoc, collection,
  query, where, getDocs, onSnapshot, arrayUnion, arrayRemove
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";
import { ref, set, onValue, onDisconnect, serverTimestamp, get }
  from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

const EMOJIS = ['😊','😎','🤔','😄','😢','😂','🥰','😜','🤩','😴','😤','👻','🎮','📚','🎵','⚽','🌸','🔥'];

let myUid = null, myData = null, contactsData = {};
let unsubContacts = null;
let notifTimeout = null;
let pendingNotifUid = null;

// ===== AUTH GUARD =====
onAuthStateChanged(auth, async user => {
  if (!user) { window.location.href = '../index.html'; return; }
  myUid = user.uid;
  await loadMyProfile();
  setupPresence();
  listenContacts();
  document.getElementById('loading').classList.add('hidden');
});

// ===== LOAD MY PROFILE =====
async function loadMyProfile() {
  const snap = await getDoc(doc(db, 'users', myUid));
  if (!snap.exists()) return;
  myData = snap.data();
  document.getElementById('myAvatar').textContent = myData.emoji || '😊';
  document.getElementById('myName').textContent   = myData.display || myData.username;
  document.getElementById('myMsg').textContent    = myData.message || '';
  document.getElementById('footerUser').textContent = '@' + myData.username;
  document.getElementById('statusSel').value = myData.status || 'online';
  updateStatusDot(myData.status || 'online');
}

// ===== PRESENCE (Realtime DB) =====
function setupPresence() {
  const statusRef = ref(rtdb, `status/${myUid}`);
  const connRef   = ref(rtdb, '.info/connected');

  onValue(connRef, snap => {
    if (!snap.val()) return;
    onDisconnect(statusRef).set({ state: 'offline', lastSeen: serverTimestamp() });
    set(statusRef, { state: 'online', lastSeen: serverTimestamp() });
  });
}

// ===== CHANGE STATUS =====
window.changeStatus = async function() {
  const s = document.getElementById('statusSel').value;
  updateStatusDot(s);
  if (myUid) {
    await updateDoc(doc(db, 'users', myUid), { status: s });
    set(ref(rtdb, `status/${myUid}`), { state: s, lastSeen: serverTimestamp() });
  }
};

function updateStatusDot(s) {
  const dot = document.getElementById('myStatusDot');
  dot.className = 'status-dot s-' + s;
  document.getElementById('footerStatus').textContent =
    { online:'● Online', away:'● Ausente', busy:'● Ocupado', offline:'● Offline' }[s] || '● Online';
}

// ===== LISTEN CONTACTS =====
function listenContacts() {
  const userRef = doc(db, 'users', myUid);

  onSnapshot(userRef, async snap => {
    if (!snap.exists()) return;
    myData = snap.data();
    const contacts = myData.contacts || [];

    // Fetch each contact's data
    contactsData = {};
    for (const uid of contacts) {
      const s = await getDoc(doc(db, 'users', uid));
      if (s.exists()) contactsData[uid] = s.data();
    }

    renderContacts();
  });
}

// ===== RENDER CONTACTS =====
window.renderContacts = function() {
  const filter = (document.getElementById('searchInput').value || '').toLowerCase();
  const area   = document.getElementById('contactsArea');

  const contacts = Object.values(contactsData).filter(c =>
    !filter ||
    c.display?.toLowerCase().includes(filter) ||
    c.username?.toLowerCase().includes(filter)
  );

  if (contacts.length === 0) {
    area.innerHTML = `<div class="empty-contacts">
      ${filter ? 'Nenhum contato encontrado.' : 'Nenhum contato ainda.<br>Adicione pelo nome de usuário abaixo.'}
    </div>`;
    return;
  }

  // Sort: online first, then by name
  const order = { online:0, away:1, busy:2, offline:3 };
  contacts.sort((a,b) => (order[a.status]||3) - (order[b.status]||3) || (a.display||'').localeCompare(b.display||''));

  area.innerHTML = '';
  const onlineCount = contacts.filter(c => c.status !== 'offline').length;

  // Single group for now — easily extendable
  const header = document.createElement('div');
  header.className = 'group-header';
  header.innerHTML = `<span class="group-arrow" id="garrow">▼</span>
    <span class="group-name">Contatos</span>
    <span class="group-count">${onlineCount}/${contacts.length}</span>`;
  header.onclick = () => {
    const list = document.getElementById('glist');
    list.classList.toggle('hidden');
    document.getElementById('garrow').classList.toggle('col');
  };
  area.appendChild(header);

  const list = document.createElement('div');
  list.className = 'group-list'; list.id = 'glist';

  contacts.forEach(c => {
    const item = document.createElement('div');
    item.className = 'contact-item';
    item.innerHTML = `
      <div class="contact-avatar">
        ${c.emoji || '😊'}
        <div class="c-dot s-${c.status || 'offline'}"></div>
      </div>
      <div class="contact-info">
        <div class="c-name">${escHtml(c.display || c.username)}</div>
        <div class="c-msg">${escHtml(c.message || '')}</div>
      </div>
    `;
    item.onclick = () => openChat(c.uid);
    list.appendChild(item);
  });

  area.appendChild(list);
};

// ===== ADD CONTACT =====
window.addContact = async function() {
  const username = document.getElementById('addInput').value.trim().toLowerCase();
  if (!username) return;

  const q = query(collection(db, 'usernames'), where('username', '==', username));
  const snap = await getDocs(q);
  if (snap.empty) { alert('Usuário não encontrado: ' + username); return; }

  const targetUid = snap.docs[0].data().uid;
  if (targetUid === myUid) { alert('Você não pode se adicionar.'); return; }
  if (contactsData[targetUid]) { alert('Contato já adicionado.'); return; }

  await updateDoc(doc(db, 'users', myUid), { contacts: arrayUnion(targetUid) });
  document.getElementById('addInput').value = '';
};

// ===== OPEN CHAT =====
window.openChat = function(uid) {
  window.location.href = `chat.html?with=${uid}`;
};

// ===== SIGN OUT =====
window.doSignOut = async function() {
  if (confirm('Deseja sair do Messenger?')) {
    await set(ref(rtdb, `status/${myUid}`), { state: 'offline', lastSeen: serverTimestamp() });
    await signOut(auth);
    window.location.href = '../index.html';
  }
};

// ===== EDIT PROFILE =====
window.openEdit = function() {
  if (!myData) return;
  // Build emoji picker
  const picker = document.getElementById('emojiPicker');
  picker.innerHTML = '';
  EMOJIS.forEach(em => {
    const span = document.createElement('span');
    span.className = 'emoji-opt' + (em === (myData.emoji||'😊') ? ' selected' : '');
    span.textContent = em;
    span.onclick = () => {
      document.querySelectorAll('.emoji-opt').forEach(e => e.classList.remove('selected'));
      span.classList.add('selected');
    };
    picker.appendChild(span);
  });
  document.getElementById('editDisplay').value = myData.display || '';
  document.getElementById('editMsg').value     = myData.message || '';
  document.getElementById('editModal').classList.add('show');
};

window.closeEdit = function() {
  document.getElementById('editModal').classList.remove('show');
};

window.saveProfile = async function() {
  const display = document.getElementById('editDisplay').value.trim();
  const message = document.getElementById('editMsg').value.trim();
  const emoji   = document.querySelector('.emoji-opt.selected')?.textContent || '😊';
  if (!display) { alert('Nome de exibição não pode ser vazio.'); return; }

  await updateDoc(doc(db, 'users', myUid), { display, message, emoji });
  document.getElementById('myAvatar').textContent = emoji;
  document.getElementById('myName').textContent   = display;
  document.getElementById('myMsg').textContent    = message;
  closeEdit();
};

function escHtml(t) {
  return String(t).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}
</script>
</body>
</html>
