<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Messenger Online</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Tahoma&display=swap');
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Tahoma', Arial, sans-serif; font-size: 11px;
    background: #1a3a6e;
    background-image: radial-gradient(ellipse at 20% 50%, #2a5298 0%, transparent 55%), radial-gradient(ellipse at 80% 20%, #0d47a1 0%, transparent 55%);
    display: flex; justify-content: center; align-items: flex-start; min-height: 100vh; padding: 20px; gap: 12px;
  }
  .msn-window {
    width: 290px; min-height: 600px; background: #fff;
    border: 1px solid #888; box-shadow: 3px 3px 10px rgba(0,0,0,.5);
    display: flex; flex-direction: column; animation: appear 0.2s ease;
  }
  @keyframes appear { from { opacity:0; transform:translateY(10px); } to { opacity:1; transform:translateY(0); } }
  .title-bar {
    height: 22px; background: linear-gradient(to bottom, #4a90d9 0%, #2563c0 50%, #1a4fa0 100%);
    display: flex; align-items: center; padding: 0 5px; gap: 4px; user-select: none; flex-shrink: 0;
  }
  .tb-text { color: #fff; font-size: 11px; font-weight: bold; flex: 1; text-shadow: 1px 1px rgba(0,0,0,.4); }
  .tb-btn { width: 16px; height: 14px; background: linear-gradient(to bottom, #e8e8e8, #b8b8b8); border: 1px solid #888; border-radius: 2px; cursor: pointer; font-size: 9px; font-weight: bold; display: flex; align-items: center; justify-content: center; color: #333; }
  .tb-btn:hover { background: linear-gradient(to bottom, #fff, #ccc); }
  .tb-btn.close:hover { background: linear-gradient(to bottom, #ff6666, #cc0000); color: #fff; }
  .menu-bar { height: 18px; background: #ece9d8; border-bottom: 1px solid #aca899; display: flex; align-items: center; padding: 0 4px; gap: 2px; flex-shrink: 0; position: relative; }
  .menu-item { font-size: 11px; color: #000; cursor: pointer; padding: 1px 6px; border-radius: 2px; }
  .menu-item:hover { background: #316ac5; color: #fff; }

  /* PROFILE HEADER */
  .msn-header { background: linear-gradient(to bottom, #e8f0ff, #ccdaff); padding: 8px; border-bottom: 1px solid #99aacc; flex-shrink: 0; }
  .my-profile { display: flex; align-items: center; gap: 8px; margin-bottom: 6px; }
  .avatar-wrap { position: relative; width: 52px; height: 52px; flex-shrink: 0; cursor: pointer; }
  .avatar {
    width: 52px; height: 52px; border: 2px solid #6688cc;
    background: linear-gradient(135deg, #4a90e2, #7b68ee);
    display: flex; align-items: center; justify-content: center;
    font-size: 28px; overflow: hidden;
  }
  .avatar img { width: 100%; height: 100%; object-fit: cover; }
  .avatar-edit-overlay {
    position: absolute; inset: 0; background: rgba(0,0,0,0.45);
    display: none; align-items: center; justify-content: center;
    color: #fff; font-size: 18px;
  }
  .avatar-wrap:hover .avatar-edit-overlay { display: flex; }
  .status-dot { position: absolute; bottom: 1px; right: 1px; width: 11px; height: 11px; border-radius: 50%; border: 2px solid #ccdaff; }
  .my-info { flex: 1; min-width: 0; }
  .my-name { font-size: 12px; font-weight: bold; color: #003399; cursor: pointer; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .my-name:hover { text-decoration: underline; }
  .my-msg { font-size: 10px; color: #555; font-style: italic; cursor: pointer; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .my-msg:hover { color: #003399; }
  .status-sel { font-size: 10px; border: 1px solid #99aacc; background: #fff; padding: 1px 2px; color: #333; font-family: inherit; cursor: pointer; margin-top: 3px; width: 100%; }

  /* TABS */
  .nav-tabs { display: flex; background: #ece9d8; border-bottom: 1px solid #aca899; flex-shrink: 0; }
  .nav-tab { flex: 1; padding: 4px 0; text-align: center; font-size: 10px; cursor: pointer; color: #555; border-bottom: 2px solid transparent; position: relative; }
  .nav-tab:hover { background: #ddd; }
  .nav-tab.active { background: #fff; color: #003399; font-weight: bold; border-bottom: 2px solid #4a90d9; }
  .badge { position: absolute; top: 1px; right: 6px; background: #cc0000; color: #fff; font-size: 8px; font-weight: bold; border-radius: 8px; padding: 0 3px; min-width: 12px; text-align: center; }

  /* SEARCH */
  .search-bar { background: #ece9d8; border-bottom: 1px solid #aca899; padding: 3px 6px; display: flex; align-items: center; gap: 4px; flex-shrink: 0; }
  .search-input { flex: 1; border: 1px solid #aaa; padding: 1px 4px; font-size: 10px; font-family: inherit; background: #fff; outline: none; }
  .search-input:focus { border-color: #4a90d9; }

  /* PANELS */
  .panel { display: none; flex: 1; flex-direction: column; overflow: hidden; }
  .panel.active { display: flex; }
  .list-area { flex: 1; overflow-y: auto; background: #fff; }
  .list-area::-webkit-scrollbar { width: 12px; }
  .list-area::-webkit-scrollbar-track { background: #f0f0f0; }
  .list-area::-webkit-scrollbar-thumb { background: linear-gradient(to bottom, #c8c8c8, #a0a0a0); border: 1px solid #888; }

  /* CONTACTS */
  .group-header { background: linear-gradient(to bottom, #e8e4d8, #d8d4c8); border-top: 1px solid #c8c4b8; border-bottom: 1px solid #b8b4a8; padding: 2px 6px; cursor: pointer; display: flex; align-items: center; gap: 4px; user-select: none; }
  .group-arrow { font-size: 8px; color: #666; transition: transform 0.15s; }
  .group-arrow.col { transform: rotate(-90deg); }
  .group-name { font-size: 11px; color: #333; font-weight: bold; }
  .group-count { font-size: 10px; color: #888; margin-left: auto; }
  .group-list.hidden { display: none; }

  .contact-item { display: flex; align-items: center; gap: 6px; padding: 3px 8px 3px 16px; cursor: pointer; border-bottom: 1px solid #f4f4f4; transition: background 0.1s; }
  .contact-item:hover { background: #dce8ff; }
  .contact-avatar { width: 32px; height: 32px; border: 1px solid #aabbdd; background: linear-gradient(135deg, #88aaee, #aabbff); display: flex; align-items: center; justify-content: center; font-size: 16px; flex-shrink: 0; position: relative; overflow: hidden; }
  .contact-avatar img { width: 100%; height: 100%; object-fit: cover; }
  .c-dot { position: absolute; bottom: 0; right: 0; width: 8px; height: 8px; border-radius: 50%; border: 1px solid #fff; }
  .contact-info { flex: 1; min-width: 0; }
  .c-name { font-size: 11px; font-weight: bold; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .c-msg  { font-size: 10px; color: #888; font-style: italic; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .s-online { background: #00c800; } .s-away { background: #ffaa00; } .s-busy { background: #cc0000; } .s-offline { background: #aaa; }

  /* ADD CONTACT BAR */
  .add-bar { background: #ece9d8; border-top: 1px solid #aca899; padding: 4px 6px; display: flex; gap: 4px; flex-shrink: 0; }
  .add-input { flex: 1; border: 1px solid #aaa; padding: 2px 4px; font-size: 10px; font-family: inherit; background: #fff; outline: none; }
  .add-input:focus { border-color: #4a90d9; }
  .add-btn { font-size: 10px; font-family: inherit; background: linear-gradient(to bottom, #4a90d9, #1a4fa0); color: #fff; border: 1px solid #1a4fa0; padding: 0 8px; cursor: pointer; border-radius: 2px; }
  .add-btn:hover { background: linear-gradient(to bottom, #5aa0e9, #2a5fb0); }

  /* REQUESTS */
  .request-item { display: flex; align-items: center; gap: 8px; padding: 6px 10px; border-bottom: 1px solid #f0f0f0; }
  .req-avatar { width: 32px; height: 32px; border: 1px solid #aabbdd; background: linear-gradient(135deg, #88aaee, #aabbff); display: flex; align-items: center; justify-content: center; font-size: 16px; flex-shrink: 0; overflow: hidden; }
  .req-avatar img { width: 100%; height: 100%; object-fit: cover; }
  .req-info { flex: 1; min-width: 0; }
  .req-name { font-size: 11px; font-weight: bold; color: #003399; }
  .req-sub  { font-size: 10px; color: #888; }
  .req-btns { display: flex; gap: 4px; }
  .req-btn { font-size: 10px; font-family: inherit; border: 1px solid #999; padding: 2px 6px; cursor: pointer; border-radius: 2px; }
  .req-btn.accept { background: linear-gradient(to bottom, #4a90d9, #1a4fa0); color: #fff; border-color: #1a4fa0; }
  .req-btn.accept:hover { background: linear-gradient(to bottom, #5aa0e9, #2a5fb0); }
  .req-btn.decline { background: linear-gradient(to bottom, #e8e4d8, #c8c4b4); color: #333; }
  .req-btn.decline:hover { background: linear-gradient(to bottom, #fff, #ddd); }

  .empty-msg { padding: 20px; text-align: center; color: #999; font-size: 11px; line-height: 1.8; }

  /* FOOTER */
  .msn-footer { height: 22px; background: linear-gradient(to bottom, #ece9d8, #d4d0c8); border-top: 1px solid #aca899; display: flex; align-items: center; padding: 0 6px; gap: 6px; flex-shrink: 0; }
  .f-btn { font-size: 10px; color: #333; cursor: pointer; padding: 1px 4px; border-radius: 2px; border: 1px solid transparent; }
  .f-btn:hover { border-color: #aaa; background: #fff; }

  /* ===== MODALS ===== */
  .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,.4); z-index: 400; align-items: center; justify-content: center; }
  .modal-overlay.show { display: flex; }
  .modal { background: #ece9d8; border: 1px solid #888; box-shadow: 3px 3px 10px rgba(0,0,0,.4); width: 300px; animation: appear 0.15s ease; }
  .modal-title { height: 22px; background: linear-gradient(to bottom, #4a90d9, #1a4fa0); display: flex; align-items: center; padding: 0 6px; gap: 4px; }
  .modal-title span { color: #fff; font-size: 11px; font-weight: bold; flex: 1; }
  .modal-body { padding: 14px; display: flex; flex-direction: column; gap: 10px; }
  .m-label { font-size: 11px; color: #333; margin-bottom: 2px; }
  .m-input { width: 100%; border: 1px solid #aaa; padding: 3px 5px; font-size: 11px; font-family: inherit; background: #fff; outline: none; }
  .m-input:focus { border-color: #4a90d9; }
  .modal-btns { display: flex; justify-content: flex-end; gap: 6px; }
  .m-btn { font-size: 11px; font-family: inherit; background: linear-gradient(to bottom, #e8e4d8, #c8c4b4); border: 1px solid #999; padding: 2px 14px; cursor: pointer; border-radius: 2px; }
  .m-btn:hover { background: linear-gradient(to bottom, #fff, #ddd); }
  .m-btn.primary { background: linear-gradient(to bottom, #4a90d9, #1a4fa0); color: #fff; border-color: #1a4fa0; }
  .m-btn.primary:hover { background: linear-gradient(to bottom, #5aa0e9, #2a5fb0); }

  /* EMOJI PICKER */
  .emoji-picker { display: flex; flex-wrap: wrap; gap: 5px; }
  .emoji-opt { font-size: 20px; cursor: pointer; padding: 2px 4px; border: 2px solid transparent; border-radius: 3px; }
  .emoji-opt:hover { background: #ddd; }
  .emoji-opt.selected { border-color: #4a90d9; background: #e8f0ff; }

  /* PHOTO UPLOAD AREA */
  .photo-area { display: flex; align-items: center; gap: 10px; }
  .photo-preview { width: 52px; height: 52px; border: 2px solid #6688cc; background: linear-gradient(135deg, #4a90e2, #7b68ee); display: flex; align-items: center; justify-content: center; font-size: 26px; overflow: hidden; flex-shrink: 0; }
  .photo-preview img { width: 100%; height: 100%; object-fit: cover; }
  .photo-btns { display: flex; flex-direction: column; gap: 4px; }
  .photo-btn { font-size: 10px; font-family: inherit; background: linear-gradient(to bottom, #e8e4d8, #c8c4b4); border: 1px solid #999; padding: 2px 8px; cursor: pointer; border-radius: 2px; }
  .photo-btn:hover { background: linear-gradient(to bottom, #fff, #ddd); }
  #photoFileInput { display: none; }

  /* PROFILE VIEW MODAL */
  .profile-view { text-align: center; padding: 10px 0; }
  .pv-avatar { width: 72px; height: 72px; border: 3px solid #6688cc; background: linear-gradient(135deg, #4a90e2, #7b68ee); display: flex; align-items: center; justify-content: center; font-size: 38px; margin: 0 auto 8px; overflow: hidden; }
  .pv-avatar img { width: 100%; height: 100%; object-fit: cover; }
  .pv-name { font-size: 14px; font-weight: bold; color: #003399; }
  .pv-username { font-size: 10px; color: #888; margin-top: 2px; }
  .pv-msg { font-size: 11px; color: #555; font-style: italic; margin-top: 6px; }
  .pv-status { margin-top: 6px; font-size: 10px; }

  /* NOTIFICATION */
  .notif-popup { position: fixed; bottom: 20px; right: 20px; z-index: 500; background: linear-gradient(to bottom, #e8f0ff, #ccdaff); border: 1px solid #6688cc; padding: 10px 14px; box-shadow: 2px 2px 8px rgba(0,0,0,.3); font-size: 11px; display: none; max-width: 220px; cursor: pointer; }
  .notif-popup.show { display: block; animation: slideUp 0.2s ease; }
  @keyframes slideUp { from { opacity:0; transform:translateY(8px); } to { opacity:1; transform:translateY(0); } }
  .notif-name { font-weight: bold; color: #003399; }
  .notif-msg  { color: #333; margin-top: 2px; }

  /* LOADING */
  .loading-screen { position: fixed; inset: 0; background: rgba(26,58,110,0.9); display: flex; align-items: center; justify-content: center; z-index: 999; flex-direction: column; gap: 12px; }
  .loading-screen.hidden { display: none; }
  .loading-text { color: #fff; font-size: 13px; }
  .loading-bar { width: 160px; height: 4px; background: rgba(255,255,255,0.2); border-radius: 2px; overflow: hidden; }
  .loading-fill { height: 100%; background: #4a90d9; border-radius: 2px; animation: fill 1.5s ease forwards; }
  @keyframes fill { from { width:0%; } to { width:100%; } }

  .toast { position: fixed; top: 20px; left: 50%; transform: translateX(-50%); background: #333; color: #fff; padding: 6px 16px; font-size: 11px; border-radius: 2px; z-index: 600; display: none; }
  .toast.show { display: block; animation: fadeIn 0.2s ease; }
  @keyframes fadeIn { from { opacity:0; } to { opacity:1; } }
</style>
</head>
<body>

<div class="loading-screen" id="loading">
  <div class="loading-text">🦋 Conectando ao Messenger...</div>
  <div class="loading-bar"><div class="loading-fill"></div></div>
</div>

<div class="msn-window">
  <div class="title-bar">
    <span>🦋</span>
    <span class="tb-text">Messenger Online</span>
    <div class="tb-btn">_</div><div class="tb-btn">□</div>
    <div class="tb-btn close" onclick="doSignOut()">✕</div>
  </div>
  <div class="menu-bar">
    <span class="menu-item" onclick="openEdit()">✏️ Perfil</span>
    <span class="menu-item" onclick="doSignOut()">🚪 Sair</span>
  </div>

  <!-- MY PROFILE -->
  <div class="msn-header">
    <div class="my-profile">
      <div class="avatar-wrap" onclick="openEdit()">
        <div class="avatar" id="myAvatar">😊</div>
        <div class="avatar-edit-overlay">✏️</div>
        <div class="status-dot s-online" id="myStatusDot"></div>
      </div>
      <div class="my-info">
        <div class="my-name" id="myName" onclick="openEdit()">Carregando...</div>
        <div class="my-msg"  id="myMsg"  onclick="openEdit()">...</div>
        <select class="status-sel" id="statusSel" onchange="changeStatus()">
          <option value="online">🟢 Online</option>
          <option value="away">🟡 Ausente</option>
          <option value="busy">🔴 Ocupado</option>
          <option value="offline">⚫ Aparecer off</option>
        </select>
      </div>
    </div>
  </div>

  <!-- TABS -->
  <div class="nav-tabs">
    <div class="nav-tab active" id="tab-contacts" onclick="switchPanel('contacts')">👥 Contatos</div>
    <div class="nav-tab" id="tab-requests" onclick="switchPanel('requests')">📨 Pedidos <span class="badge" id="reqBadge" style="display:none">0</span></div>
  </div>

  <!-- CONTACTS PANEL -->
  <div class="panel active" id="panel-contacts">
    <div class="search-bar">
      <span>🔍</span>
      <input class="search-input" type="text" id="searchInput" placeholder="Procurar contato..." oninput="renderContacts()">
    </div>
    <div class="list-area" id="contactsArea">
      <div class="empty-msg">Carregando...</div>
    </div>
    <div class="add-bar">
      <input class="add-input" type="text" id="addInput" placeholder="Enviar pedido: nome de usuário">
      <button class="add-btn" onclick="sendRequest()">+ Adicionar</button>
    </div>
  </div>

  <!-- REQUESTS PANEL -->
  <div class="panel" id="panel-requests">
    <div class="list-area" id="requestsArea">
      <div class="empty-msg">Nenhum pedido pendente.</div>
    </div>
  </div>

  <div class="msn-footer">
    <div class="f-btn" id="footerStatus">● Online</div>
    <div style="margin-left:auto;font-size:10px;color:#666;" id="footerUser"></div>
  </div>
</div>

<!-- NOTIFICATION -->
<div class="notif-popup" id="notifPopup" onclick="handleNotifClick()">
  <div class="notif-name" id="notifName"></div>
  <div class="notif-msg"  id="notifMsg"></div>
</div>

<!-- TOAST -->
<div class="toast" id="toast"></div>

<!-- EDIT PROFILE MODAL -->
<div class="modal-overlay" id="editModal">
  <div class="modal">
    <div class="modal-title"><span>✏️ Editar perfil</span><div class="tb-btn close" onclick="closeEdit()">✕</div></div>
    <div class="modal-body">
      <!-- Photo -->
      <div>
        <div class="m-label">Foto de perfil:</div>
        <div class="photo-area">
          <div class="photo-preview" id="photoPreview">😊</div>
          <div class="photo-btns">
            <button class="photo-btn" onclick="document.getElementById('photoFileInput').click()">📁 Escolher foto</button>
            <button class="photo-btn" onclick="removePhoto()">🗑️ Remover foto</button>
            <input type="file" id="photoFileInput" accept="image/*" onchange="handlePhotoSelect(event)">
          </div>
        </div>
      </div>
      <!-- Emoji -->
      <div>
        <div class="m-label">Emoji (quando sem foto):</div>
        <div class="emoji-picker" id="emojiPicker"></div>
      </div>
      <!-- Fields -->
      <div><div class="m-label">Nome de exibição:</div><input class="m-input" type="text" id="editDisplay" maxlength="40"></div>
      <div><div class="m-label">Recado pessoal:</div><input class="m-input" type="text" id="editMsg" maxlength="100"></div>
      <div class="modal-btns">
        <button class="m-btn" onclick="closeEdit()">Cancelar</button>
        <button class="m-btn primary" onclick="saveProfile()">💾 Salvar</button>
      </div>
    </div>
  </div>
</div>

<!-- VIEW CONTACT PROFILE MODAL -->
<div class="modal-overlay" id="profileModal">
  <div class="modal">
    <div class="modal-title"><span>👤 Perfil</span><div class="tb-btn close" onclick="closeProfileModal()">✕</div></div>
    <div class="modal-body">
      <div class="profile-view">
        <div class="pv-avatar" id="pvAvatar">😊</div>
        <div class="pv-name" id="pvName"></div>
        <div class="pv-username" id="pvUsername"></div>
        <div class="pv-msg" id="pvMsg"></div>
        <div class="pv-status" id="pvStatus"></div>
      </div>
      <div class="modal-btns">
        <button class="m-btn" onclick="closeProfileModal()">Fechar</button>
        <button class="m-btn primary" id="pvChatBtn">💬 Conversar</button>
      </div>
    </div>
  </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
import { getFirestore, doc, getDoc, updateDoc, collection, query, where, getDocs, onSnapshot, arrayUnion, arrayRemove, setDoc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";
import { getDatabase, ref, set, onValue, onDisconnect, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

const firebaseConfig = {
  apiKey:            "AIzaSyDZkMLH3r5Vym9eE1YqHH8R_rWGR6_rWiw",
  authDomain:        "mensageiro-992b3.firebaseapp.com",
  projectId:         "mensageiro-992b3",
  storageBucket:     "mensageiro-992b3.firebasestorage.app",
  messagingSenderId: "484817145298",
  appId:             "1:484817145298:web:cf5ec0ac2b197f9d2c4c0b",
  databaseURL:       "https://mensageiro-992b3-default-rtdb.firebaseio.com"
};

const app  = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db   = getFirestore(app);
const rtdb = getDatabase(app);

const EMOJIS = ['😊','😎','🤔','😄','😢','😂','🥰','😜','🤩','😴','😤','👻','🎮','📚','🎵','⚽','🌸','🔥','✝️','🙏'];

let myUid = null, myData = null;
let contactsData = {};
let pendingPhotoBase64 = null;
let pendingRemovePhoto = false;
let viewingUid = null;
let notifTimeout = null;

// ===== AUTH =====
onAuthStateChanged(auth, async user => {
  if (!user) { window.location.href = '../index.html'; return; }
  myUid = user.uid;
  await loadMyProfile();
  setupPresence();
  listenContacts();
  listenRequests();
  document.getElementById('loading').classList.add('hidden');
});

// ===== LOAD PROFILE =====
async function loadMyProfile() {
  const snap = await getDoc(doc(db, 'users', myUid));
  if (!snap.exists()) return;
  myData = snap.data();
  renderMyProfile();
}

function renderMyProfile() {
  const av = document.getElementById('myAvatar');
  if (myData.photoBase64) {
    av.innerHTML = `<img src="${myData.photoBase64}" alt="foto">`;
  } else {
    av.textContent = myData.emoji || '😊';
  }
  document.getElementById('myName').textContent    = myData.display || myData.username;
  document.getElementById('myMsg').textContent     = myData.message || 'Clique para adicionar recado...';
  document.getElementById('footerUser').textContent = '@' + myData.username;
  document.getElementById('statusSel').value        = myData.status || 'online';
  updateStatusDot(myData.status || 'online');
}

// ===== PRESENCE =====
function setupPresence() {
  const statusRef = ref(rtdb, `status/${myUid}`);
  const connRef   = ref(rtdb, '.info/connected');
  onValue(connRef, snap => {
    if (!snap.val()) return;
    onDisconnect(statusRef).set({ state: 'offline', lastSeen: serverTimestamp() });
    set(statusRef, { state: 'online', lastSeen: serverTimestamp() });
  });
}

// ===== STATUS =====
window.changeStatus = async function() {
  const s = document.getElementById('statusSel').value;
  updateStatusDot(s);
  await updateDoc(doc(db, 'users', myUid), { status: s });
  set(ref(rtdb, `status/${myUid}`), { state: s, lastSeen: serverTimestamp() });
};

function updateStatusDot(s) {
  document.getElementById('myStatusDot').className = 'status-dot s-' + s;
  document.getElementById('footerStatus').textContent =
    { online:'● Online', away:'● Ausente', busy:'● Ocupado', offline:'● Offline' }[s] || '● Online';
}

// ===== PANELS =====
window.switchPanel = function(name) {
  ['contacts','requests'].forEach(p => {
    document.getElementById('panel-' + p).classList.toggle('active', p === name);
    document.getElementById('tab-' + p).classList.toggle('active', p === name);
  });
};

// ===== LISTEN CONTACTS =====
function listenContacts() {
  onSnapshot(doc(db, 'users', myUid), async snap => {
    if (!snap.exists()) return;
    myData = snap.data();
    renderMyProfile();
    const contacts = myData.contacts || [];
    contactsData = {};
    for (const uid of contacts) {
      const s = await getDoc(doc(db, 'users', uid));
      if (s.exists()) contactsData[uid] = s.data();
    }
    renderContacts();
  });
}

// ===== RENDER CONTACTS =====
window.renderContacts = function() {
  const filter = (document.getElementById('searchInput').value || '').toLowerCase();
  const area   = document.getElementById('contactsArea');
  const list   = Object.values(contactsData).filter(c =>
    !filter || (c.display||'').toLowerCase().includes(filter) || (c.username||'').toLowerCase().includes(filter)
  );

  if (list.length === 0) {
    area.innerHTML = `<div class="empty-msg">${filter ? 'Nenhum contato encontrado.' : 'Nenhum contato ainda.<br>Adicione pelo nome de usuário abaixo.'}</div>`;
    return;
  }

  const order = { online:0, away:1, busy:2, offline:3 };
  list.sort((a,b) => (order[a.status]||3) - (order[b.status]||3));

  area.innerHTML = '';
  const online = list.filter(c => c.status !== 'offline').length;

  const header = document.createElement('div');
  header.className = 'group-header';
  header.innerHTML = `<span class="group-arrow" id="garrow">▼</span><span class="group-name">Contatos</span><span class="group-count">${online}/${list.length}</span>`;
  header.onclick = () => { document.getElementById('glist').classList.toggle('hidden'); document.getElementById('garrow').classList.toggle('col'); };
  area.appendChild(header);

  const gl = document.createElement('div');
  gl.className = 'group-list'; gl.id = 'glist';

  list.forEach(c => {
    const item = document.createElement('div');
    item.className = 'contact-item';
    const avatarHtml = c.photoBase64
      ? `<img src="${c.photoBase64}" alt="">`
      : (c.emoji || '😊');
    item.innerHTML = `
      <div class="contact-avatar">${avatarHtml}<div class="c-dot s-${c.status||'offline'}"></div></div>
      <div class="contact-info">
        <div class="c-name">${escHtml(c.display || c.username)}</div>
        <div class="c-msg">${escHtml(c.message || '')}</div>
      </div>`;
    item.onclick = () => openProfileModal(c.uid);
    gl.appendChild(item);
  });
  area.appendChild(gl);
};

// ===== FRIEND REQUESTS =====
window.sendRequest = async function() {
  const username = document.getElementById('addInput').value.trim().toLowerCase();
  if (!username) return;
  if (username === myData.username) { showToast('Você não pode se adicionar.'); return; }

  const q = query(collection(db, 'usernames'), where('username', '==', username));
  const snap = await getDocs(q);
  if (snap.empty) { showToast('Usuário não encontrado: @' + username); return; }

  const targetUid = snap.docs[0].data().uid;
  if (contactsData[targetUid]) { showToast('Contato já adicionado.'); return; }

  // Check if already sent
  const targetSnap = await getDoc(doc(db, 'users', targetUid));
  const targetData = targetSnap.data();
  const pending = targetData.pendingRequests || [];
  if (pending.includes(myUid)) { showToast('Pedido já enviado.'); return; }

  await updateDoc(doc(db, 'users', targetUid), { pendingRequests: arrayUnion(myUid) });
  document.getElementById('addInput').value = '';
  showToast('✅ Pedido enviado para @' + username);
};

function listenRequests() {
  onSnapshot(doc(db, 'users', myUid), async snap => {
    if (!snap.exists()) return;
    const data = snap.data();
    const pending = data.pendingRequests || [];
    const badge = document.getElementById('reqBadge');
    badge.style.display = pending.length > 0 ? 'inline' : 'none';
    badge.textContent = pending.length;

    const area = document.getElementById('requestsArea');
    if (pending.length === 0) { area.innerHTML = '<div class="empty-msg">Nenhum pedido pendente.</div>'; return; }

    area.innerHTML = '';
    for (const uid of pending) {
      const s = await getDoc(doc(db, 'users', uid));
      if (!s.exists()) continue;
      const c = s.data();
      const item = document.createElement('div');
      item.className = 'request-item';
      const avatarHtml = c.photoBase64 ? `<img src="${c.photoBase64}" alt="">` : (c.emoji || '😊');
      item.innerHTML = `
        <div class="req-avatar">${avatarHtml}</div>
        <div class="req-info">
          <div class="req-name">${escHtml(c.display || c.username)}</div>
          <div class="req-sub">@${escHtml(c.username)} quer ser seu contato</div>
        </div>
        <div class="req-btns">
          <button class="req-btn accept" onclick="acceptRequest('${uid}')">✔</button>
          <button class="req-btn decline" onclick="declineRequest('${uid}')">✘</button>
        </div>`;
      area.appendChild(item);
    }
  });
}

window.acceptRequest = async function(uid) {
  await updateDoc(doc(db, 'users', myUid), {
    contacts: arrayUnion(uid),
    pendingRequests: arrayRemove(uid)
  });
  await updateDoc(doc(db, 'users', uid), { contacts: arrayUnion(myUid) });
  showToast('✅ Contato adicionado!');
};

window.declineRequest = async function(uid) {
  await updateDoc(doc(db, 'users', myUid), { pendingRequests: arrayRemove(uid) });
  showToast('Pedido recusado.');
};

// ===== PROFILE MODAL (view contact) =====
window.openProfileModal = function(uid) {
  viewingUid = uid;
  const c = contactsData[uid];
  if (!c) return;

  const av = document.getElementById('pvAvatar');
  if (c.photoBase64) av.innerHTML = `<img src="${c.photoBase64}" alt="">`;
  else av.textContent = c.emoji || '😊';

  document.getElementById('pvName').textContent     = c.display || c.username;
  document.getElementById('pvUsername').textContent = '@' + c.username;
  document.getElementById('pvMsg').textContent      = c.message || '';
  document.getElementById('pvStatus').innerHTML     =
    `<span class="c-dot s-${c.status||'offline'}" style="position:static;display:inline-block;width:8px;height:8px;border-radius:50%;margin-right:4px;border:1px solid #ccc;"></span>`
    + ({ online:'Online', away:'Ausente', busy:'Ocupado', offline:'Offline' }[c.status||'offline']);

  document.getElementById('pvChatBtn').onclick = () => { closeProfileModal(); openChat(uid); };
  document.getElementById('profileModal').classList.add('show');
};
window.closeProfileModal = function() { document.getElementById('profileModal').classList.remove('show'); };

window.openChat = function(uid) { window.location.href = `chat.html?with=${uid}`; };

// ===== EDIT PROFILE =====
window.openEdit = function() {
  if (!myData) return;
  pendingPhotoBase64 = null;
  pendingRemovePhoto = false;

  // Photo preview
  const prev = document.getElementById('photoPreview');
  if (myData.photoBase64) prev.innerHTML = `<img src="${myData.photoBase64}" alt="">`;
  else prev.textContent = myData.emoji || '😊';

  // Emoji
  const picker = document.getElementById('emojiPicker');
  picker.innerHTML = '';
  EMOJIS.forEach(em => {
    const span = document.createElement('span');
    span.className = 'emoji-opt' + (em === (myData.emoji||'😊') ? ' selected' : '');
    span.textContent = em;
    span.onclick = () => { document.querySelectorAll('.emoji-opt').forEach(e => e.classList.remove('selected')); span.classList.add('selected'); };
    picker.appendChild(span);
  });

  document.getElementById('editDisplay').value = myData.display || '';
  document.getElementById('editMsg').value     = myData.message || '';
  document.getElementById('editModal').classList.add('show');
};
window.closeEdit = function() { document.getElementById('editModal').classList.remove('show'); };

window.handlePhotoSelect = function(event) {
  const file = event.target.files[0];
  if (!file) return;
  if (file.size > 500000) { showToast('Foto muito grande. Máximo 500KB.'); return; }
  const reader = new FileReader();
  reader.onload = e => {
    pendingPhotoBase64 = e.target.result;
    pendingRemovePhoto = false;
    const prev = document.getElementById('photoPreview');
    prev.innerHTML = `<img src="${pendingPhotoBase64}" alt="">`;
  };
  reader.readAsDataURL(file);
};

window.removePhoto = function() {
  pendingRemovePhoto = true;
  pendingPhotoBase64 = null;
  const prev = document.getElementById('photoPreview');
  prev.textContent = document.querySelector('.emoji-opt.selected')?.textContent || myData.emoji || '😊';
};

window.saveProfile = async function() {
  const display = document.getElementById('editDisplay').value.trim();
  const message = document.getElementById('editMsg').value.trim();
  const emoji   = document.querySelector('.emoji-opt.selected')?.textContent || '😊';
  if (!display) { showToast('Nome não pode ser vazio.'); return; }

  const update = { display, message, emoji };
  if (pendingPhotoBase64) update.photoBase64 = pendingPhotoBase64;
  if (pendingRemovePhoto) update.photoBase64 = '';

  await updateDoc(doc(db, 'users', myUid), update);
  closeEdit();
  showToast('✅ Perfil salvo!');
};

// ===== SIGN OUT =====
window.doSignOut = async function() {
  if (confirm('Deseja sair do Messenger?')) {
    await set(ref(rtdb, `status/${myUid}`), { state: 'offline', lastSeen: serverTimestamp() });
    await signOut(auth);
    window.location.href = '../index.html';
  }
};

// ===== UTILS =====
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}

function escHtml(t) {
  return String(t||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}
</script>
